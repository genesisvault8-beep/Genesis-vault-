<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Vault</title>

<!-- DEFENSE: No indexing, no caching, no referrer leakage -->
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="referrer" content="no-referrer">

<!-- DEFENSE: No favicon request leak -->
<link rel="icon" href="data:,">

<style>
  /* Show nothing — black screen only */
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background:#020608;
    width:100%; height:100%;
    overflow:hidden;
    cursor:none; /* nothing to see here */
  }
</style>
</head>
<body>
<script>
(function() {

  // ── DEFENSE 1: Detect devtools open (basic) ──
  const devtools = { open: false };
  const threshold = 160;
  setInterval(function() {
    if (
      window.outerWidth - window.innerWidth > threshold ||
      window.outerHeight - window.innerHeight > threshold
    ) {
      devtools.open = true;
    }
  }, 500);

  // ── DEFENSE 2: Disable right-click ──
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  });

  // ── DEFENSE 3: Disable common inspect shortcuts ──
  document.addEventListener('keydown', function(e) {
    if (
      e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && ['I','J','C','U'].includes(e.key)) ||
      (e.ctrlKey && e.key === 'U')
    ) {
      e.preventDefault();
    }
  });

  // ── DEFENSE 4: Log suspicious visits (bot/scraper detection) ──
  const suspicious =
    !navigator.cookieEnabled ||
    !window.localStorage ||
    navigator.webdriver === true || // Selenium/Puppeteer flag
    /bot|crawl|spider|scrape|headless/i.test(navigator.userAgent);

  if (suspicious) {
    // Dead end — show nothing, go nowhere
    document.body.style.background = '#000';
    return;
  }

  // ── DEFENSE 5: Honeypot timing — random micro-delay ──
  // Makes scraper timing analysis harder
  const delay = Math.floor(Math.random() * 300) + 100;

  setTimeout(function() {

    // ── ROUTER LOGIC ──
    try {
      // Check Supabase session in localStorage
      // Key format: sb-<project-ref>-auth-token
      const sessionKey = Object.keys(localStorage).find(k =>
        k.startsWith('sb-') && k.endsWith('-auth-token')
      );

      if (sessionKey) {
        const raw = localStorage.getItem(sessionKey);
        if (raw) {
          const session = JSON.parse(raw);
          const expiresAt = session?.expires_at;
          const now = Math.floor(Date.now() / 1000);

          if (expiresAt && expiresAt > now) {
            // Valid session → dashboard
            window.location.replace('dashboard.html');
            return;
          }
        }
      }

      // No valid session → login
      window.location.replace('login.html');

    } catch(e) {
      // Any error → login (fail safe)
      window.location.replace('login.html');
    }

  }, delay);

})();
</script>
</body>
</html>
