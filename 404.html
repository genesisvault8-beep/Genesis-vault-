<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Vault | 404</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #020608;
    --bg2:     #060d10;
    --accent:  #00f5c4;
    --accent2: #00a8ff;
    --accent3: #ff003c;
    --text:    #c8e6f0;
    --text-dim:#4a7a8a;
    --border:  #0f2a35;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Rajdhani',sans-serif;
    overflow:hidden;
  }

  /* Grid */
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,245,196,0.02) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,245,196,0.02) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none; z-index:0;
  }

  /* Scanlines */
  body::after {
    content:''; position:fixed; inset:0;
    background:repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
    );
    pointer-events:none; z-index:1;
  }

  /* NAV */
  nav {
    position:fixed; top:0; left:0; right:0;
    background:rgba(2,6,8,0.95);
    border-bottom:1px solid var(--border);
    padding:0 18px; height:52px;
    display:flex; align-items:center;
    justify-content:space-between;
    z-index:100; backdrop-filter:blur(10px);
  }
  .nav-logo {
    font-family:'Share Tech Mono',monospace;
    font-size:0.85rem; letter-spacing:3px;
    position:relative; user-select:none;
  }
  .nav-logo .g { color:var(--accent); }
  .nav-logo .v { color:white; }
  .nav-logo::before,.nav-logo::after {
    content:attr(data-text); position:absolute;
    top:0; left:0; width:100%; height:100%;
    font-family:'Share Tech Mono',monospace;
    font-size:0.85rem; letter-spacing:3px; pointer-events:none;
  }
  .nav-logo::before { color:var(--accent3); clip-path:polygon(0 20%,100% 20%,100% 40%,0 40%); animation:glitch1 4s infinite; left:2px; }
  .nav-logo::after  { color:var(--accent2); clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%); animation:glitch2 4s infinite; left:-2px; }
  @keyframes glitch1 { 0%,90%,100%{opacity:0} 91%{opacity:1;transform:translateX(-3px)} 93%{opacity:1;transform:translateX(3px)} 95%{opacity:0} }
  @keyframes glitch2 { 0%,90%,100%{opacity:0} 92%{opacity:1;transform:translateX(3px)} 94%{opacity:1;transform:translateX(-3px)} 96%{opacity:0} }

  /* FULL SCREEN CENTER */
  .page {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:52px 24px 24px;
    z-index:2;
  }

  /* STATUS LINE */
  .status-line {
    font-family:'Share Tech Mono',monospace;
    font-size:0.6rem;
    letter-spacing:3px;
    color:var(--accent3);
    margin-bottom:14px;
    animation:blink 2s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* 404 */
  .error-code {
    font-family:'Share Tech Mono',monospace;
    font-size:26vw;
    font-weight:400;
    color:white;
    letter-spacing:4px;
    line-height:1;
    position:relative;
    display:inline-block;
    margin-bottom:2px;
  }
  .error-code::before {
    content:'404'; position:absolute;
    top:0; left:4px; width:100%; height:100%;
    color:var(--accent3);
    clip-path:polygon(0 18%,100% 18%,100% 34%,0 34%);
    animation:gb1 3s infinite;
  }
  .error-code::after {
    content:'404'; position:absolute;
    top:0; left:-4px; width:100%; height:100%;
    color:var(--accent);
    clip-path:polygon(0 58%,100% 58%,100% 74%,0 74%);
    animation:gb2 3s infinite;
  }
  @keyframes gb1 { 0%,84%,100%{opacity:0} 85%{opacity:1;transform:translateX(-5px) skewX(-3deg)} 88%{opacity:1;transform:translateX(5px)} 91%{opacity:0} }
  @keyframes gb2 { 0%,84%,100%{opacity:0} 86%{opacity:1;transform:translateX(5px) skewX(3deg)} 89%{opacity:1;transform:translateX(-5px)} 92%{opacity:0} }

  /* LINE UNDER 404 */
  .corrupt-line {
    width:80%;
    height:2px;
    background:linear-gradient(90deg,transparent,var(--accent3),var(--accent),transparent);
    margin:0 auto 16px;
    animation:cpulse 2.5s ease-in-out infinite;
  }
  @keyframes cpulse { 0%,100%{opacity:0.3;transform:scaleX(0.5)} 50%{opacity:1;transform:scaleX(1)} }

  /* MESSAGE */
  .msg {
    font-family:'Share Tech Mono',monospace;
    font-size:0.72rem;
    color:var(--text-dim);
    letter-spacing:1px;
    line-height:2;
    text-align:center;
    margin-bottom:18px;
  }
  .msg .hi  { color:var(--accent2); }
  .msg .hi2 { color:var(--accent); }

  /* TERMINAL */
  .terminal {
    width:100%;
    max-width:340px;
    background:var(--bg2);
    border:1px solid var(--border);
    border-left:3px solid var(--accent3);
    padding:12px 16px;
    margin-bottom:20px;
    position:relative;
  }
  .terminal::before {
    content:'// SYS LOG';
    position:absolute; top:0; right:12px;
    transform:translateY(-50%);
    font-family:'Share Tech Mono',monospace;
    font-size:0.55rem; color:var(--accent3);
    letter-spacing:2px; background:var(--bg2);
    padding:0 5px;
  }
  .t-line {
    font-family:'Share Tech Mono',monospace;
    font-size:0.65rem; color:var(--text-dim);
    line-height:1.9; opacity:0;
    animation:tappear 0.3s ease forwards;
  }
  .t-line:nth-child(1){animation-delay:0.3s}
  .t-line:nth-child(2){animation-delay:0.7s}
  .t-line:nth-child(3){animation-delay:1.1s}
  .t-line:nth-child(4){animation-delay:1.5s;color:var(--accent3)}
  .t-line:nth-child(5){animation-delay:1.9s;color:var(--accent)}
  @keyframes tappear { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:none} }

  .cursor {
    display:inline-block; width:7px; height:12px;
    background:var(--accent); vertical-align:middle;
    margin-left:3px; animation:blink 1s step-end infinite;
  }

  /* BUTTONS — stacked for mobile */
  .btn-row {
    display:flex; flex-direction:column;
    gap:10px; width:100%; max-width:340px;
  }
  .btn-home {
    background:var(--accent); color:var(--bg);
    border:none; padding:14px;
    font-family:'Rajdhani',sans-serif;
    font-weight:700; font-size:1rem;
    letter-spacing:3px; cursor:pointer;
    transition:all 0.2s; text-decoration:none;
    text-align:center; display:block;
    clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  }
  .btn-home:active { background:white; }
  .btn-dash {
    background:none; border:1px solid var(--border);
    color:var(--text-dim); padding:13px;
    font-family:'Share Tech Mono',monospace;
    font-size:0.72rem; letter-spacing:2px;
    cursor:pointer; transition:all 0.2s;
    text-decoration:none; text-align:center; display:block;
  }
  .btn-dash:active { border-color:var(--accent); color:var(--accent); }

  /* COUNTDOWN */
  .redirect-note {
    font-family:'Share Tech Mono',monospace;
    font-size:0.6rem; color:var(--text-dim);
    letter-spacing:1px; margin-top:14px;
    text-align:center;
  }
  .redirect-note span { color:var(--accent2); }

  /* PARTICLES */
  .particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .particle {
    position:absolute; width:1px; opacity:0;
    animation:fall linear infinite;
  }
  @keyframes fall {
    0%  { opacity:0; transform:translateY(-10px); }
    10% { opacity:0.5; }
    90% { opacity:0.15; }
    100%{ opacity:0; transform:translateY(100vh); }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<nav>
  <div class="nav-logo" data-text="GENESISVAULT">
    <span class="g">GENESIS</span><span class="v">VAULT</span>
  </div>
</nav>

<div class="page">

  <div class="status-line">// NODE UNREACHABLE · SIGNAL LOST</div>

  <div class="error-code">404</div>
  <div class="corrupt-line"></div>

  <p class="msg">
    <span class="hi">PAGE NOT FOUND.</span><br>
    This node doesn't exist<br>
    <span class="hi2">in the vault.</span>
  </p>

  <div class="terminal">
    <div class="t-line">&gt; resolving path...</div>
    <div class="t-line">&gt; scanning vault nodes...</div>
    <div class="t-line">&gt; querying index...</div>
    <div class="t-line">&gt; ERROR: node_not_found [0x404]</div>
    <div class="t-line">&gt; awaiting redirect<span class="cursor"></span></div>
  </div>

  <div class="btn-row">
    <a class="btn-home" href="index.html">← RETURN HOME</a>
    <a class="btn-dash" href="dashboard.html">[ DASHBOARD ]</a>
  </div>

  <div class="redirect-note">// auto-redirect in <span id="countdown">10</span>s</div>

</div>

<script>
  let t = 10;
  const el = document.getElementById('countdown');
  const iv = setInterval(() => {
    t--; el.textContent = t;
    if (t <= 0) { clearInterval(iv); location.href = 'index.html'; }
  }, 1000);

  const c = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left:${Math.random()*100}%;
      height:${30+Math.random()*60}px;
      animation-duration:${5+Math.random()*7}s;
      animation-delay:${Math.random()*6}s;
      background:${Math.random()>0.6?'var(--accent3)':Math.random()>0.5?'var(--accent2)':'var(--accent)'};
    `;
    c.appendChild(p);
  }
</script>
</body>
</html>
