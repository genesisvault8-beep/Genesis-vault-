<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Vault | Learn</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020608;
    --bg2: #060d10;
    --bg3: #0a1520;
    --accent: #00f5c4;
    --accent2: #00a8ff;
    --accent3: #ff003c;
    --text: #c8e6f0;
    --text-dim: #4a7a8a;
    --border: #0f2a35;
    --glow: 0 0 20px rgba(0,245,196,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(2,6,8,0.95);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .nav-logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    letter-spacing: 3px;
  }

  .nav-logo span:first-child { color: var(--accent); }
  .nav-logo span:last-child { color: white; }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  main {
    padding-top: 76px;
    padding-bottom: 30px;
    position: relative;
    z-index: 1;
    padding-left: 16px;
    padding-right: 16px;
  }

  .section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 8px;
  }

  /* SEARCH */
  .search-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .search-bar input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text-dim); }

  .search-bar button {
    background: var(--accent);
    border: none;
    color: var(--bg);
    padding: 10px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 1px;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .tab {
    padding: 8px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* COURSE CARDS */
  .courses-grid {
    display: grid;
    gap: 12px;
  }

  .course-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    animation: fadeIn 0.4s ease;
    position: relative;
  }

  .course-card:hover { border-color: var(--accent); box-shadow: var(--glow); }
  .course-card.locked { opacity: 0.8; }
  .course-card.locked:hover { border-color: var(--accent3); }
  /* BUG FIX: disabled card for misconfigured vc_cost=0 */
  .course-card.disabled { opacity: 0.5; cursor: not-allowed; }
  .course-card.disabled:hover { border-color: var(--border); box-shadow: none; }

  .course-card .course-category {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .course-card h3 {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    color: white;
    margin-bottom: 6px;
  }

  .course-card p {
    font-size: 0.8rem;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .course-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .free-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 2px 8px;
    letter-spacing: 1px;
  }

  .price-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent3);
    border: 1px solid var(--accent3);
    padding: 2px 8px;
    letter-spacing: 1px;
  }

  .lock-icon {
    font-size: 1rem;
    color: var(--accent3);
  }

  /* COURSE READER */
  .course-reader {
    display: none;
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 20px;
    margin-top: 16px;
    animation: fadeIn 0.3s ease;
  }

  .course-reader.active { display: block; }

  .reader-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .reader-header h2 {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
  }

  .close-reader {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    cursor: pointer;
    font-size: 0.9rem;
  }

  .close-reader:hover { border-color: var(--accent3); color: var(--accent3); }

  .reader-content {
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text);
  }
  .reader-content h1, .reader-content h2, .reader-content h3 {
    font-family: 'Share Tech Mono', monospace;
    color: var(--accent);
    letter-spacing: 2px;
    margin: 20px 0 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }
  .reader-content h1 { font-size: 1rem; }
  .reader-content h2 { font-size: 0.9rem; }
  .reader-content h3 { font-size: 0.85rem; }
  .reader-content p {
    font-family: 'Rajdhani', sans-serif;
    margin-bottom: 12px;
    color: var(--text);
  }
  .reader-content code {
    background: var(--bg3);
    color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    padding: 2px 6px;
    border-radius: 2px;
    word-break: break-all;
  }
  .reader-content pre {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 14px;
    margin: 12px 0;
    overflow-x: auto;
  }
  .reader-content pre code {
    background: none;
    padding: 0;
    color: var(--accent2);
    font-size: 0.8rem;
    line-height: 1.6;
  }
  .reader-content ul, .reader-content ol {
    padding-left: 20px;
    margin-bottom: 12px;
  }
  .reader-content li {
    font-family: 'Rajdhani', sans-serif;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.6;
  }
  .reader-content strong {
    color: white;
    font-weight: 700;
  }
  .reader-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  /* PAYMENT MODAL */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(2,6,8,0.97);
    z-index: 200;
    padding: 20px;
    overflow-y: auto;
  }

  .modal.active { display: block; }

  .modal-box {
    background: var(--bg2);
    border: 1px solid var(--accent);
    padding: 24px;
    max-width: 400px;
    margin: 40px auto;
  }

  .modal-box h3 {
    font-family: 'Share Tech Mono', monospace;
    color: var(--accent);
    letter-spacing: 3px;
    font-size: 0.9rem;
    margin-bottom: 16px;
  }

  .wallet-box {
    background: var(--bg3);
    border: 1px solid var(--accent);
    padding: 12px;
    margin-bottom: 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    word-break: break-all;
    letter-spacing: 1px;
  }

  .payment-amount {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.4rem;
    color: var(--accent);
    text-align: center;
    margin-bottom: 16px;
  }

  .modal-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    outline: none;
    margin-bottom: 12px;
  }

  .modal-input:focus { border-color: var(--accent); }
  .modal-input::placeholder { color: var(--text-dim); }

  .btn-pay {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 3px;
    cursor: pointer;
    margin-bottom: 8px;
    transition: all 0.2s;
  }

  .btn-pay:hover:not(:disabled) { background: white; }
  .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-cancel {
    width: 100%;
    padding: 10px;
    background: none;
    color: var(--text-dim);
    border: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { border-color: var(--accent3); color: var(--accent3); }

  .step {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 8px;
    padding-left: 8px;
    border-left: 2px solid var(--accent);
  }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
  }

  .empty {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>

<nav>
  <div class="nav-logo"><span>GENESIS</span><span>VAULT</span></div>
  <button class="back-btn" onclick="window.location.href='dashboard.html'">← BACK</button>
</nav>

<main>
  <p class="section-title">// Knowledge Vault</p>

  <!-- SEARCH -->
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search courses..." oninput="filterCourses()">
    <button onclick="filterCourses()">SEARCH</button>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('all', this)">ALL</div>
    <div class="tab" onclick="switchTab('beginner', this)">BEGINNER</div>
    <div class="tab" onclick="switchTab('recon', this)">RECON</div>
    <div class="tab" onclick="switchTab('web', this)">WEB HACKING</div>
    <div class="tab" onclick="switchTab('tools', this)">TOOLS</div>
    <div class="tab" onclick="switchTab('bugbounty', this)">BUG BOUNTY</div>
  </div>

  <!-- COURSE READER -->
  <div class="course-reader" id="course-reader">
    <div class="reader-header">
      <h2 id="reader-title">// COURSE</h2>
      <button class="close-reader" onclick="closeReader()">✕</button>
    </div>
    <div class="reader-content" id="reader-content"></div>
  </div>

  <!-- COURSES GRID -->
  <div class="courses-grid" id="courses-grid">
    <div class="loading"><span class="spinner"></span>Loading courses...</div>
  </div>
</main>

<!-- VC UNLOCK MODAL -->
<div class="modal" id="payment-modal">
  <div class="modal-box">
    <h3>// UNLOCK COURSE</h3>
    <p id="pay-course-title" style="color:white;font-weight:700;letter-spacing:1px;margin-bottom:12px;"></p>

    <div class="payment-amount" id="pay-amount" style="font-size:1.4rem;color:#f5c400;">⬡ 0 VC</div>

    <div class="step" style="border-left-color:#f5c400;margin-bottom:8px;">
      Balance: <span id="modal-vc-balance" style="color:#f5c400;font-family:'Share Tech Mono',monospace;">— VC</span>
    </div>
    <div class="step" style="border-left-color:var(--accent);">Unlocks <strong>instantly</strong> — no waiting for admin</div>

    <div id="pay-status" style="display:none;padding:10px 14px;font-family:'Share Tech Mono',monospace;font-size:0.75rem;letter-spacing:1px;margin:10px 0;"></div>
    <button class="btn-pay" id="btn-pay" onclick="submitPayment()">[ UNLOCK WITH VC ]</button>
    <button class="btn-cancel" onclick="closePayment()">Cancel</button>

    <p style="font-family:'Share Tech Mono',monospace;font-size:0.62rem;color:var(--text-dim);margin-top:12px;text-align:center;">
      // Need more VC? <a href="buy-vc.html" style="color:#f5c400;text-decoration:none;">[ BUY VC ]</a>
    </p>
  </div>
</div>

<script>
const API = 'https://genesis-vault-backend.onrender.com/api';
let token = localStorage.getItem('gv_token');
let allCourses = [];
let currentTab = 'all';
let selectedCourse = null;
let vcBalance = 0;

if (!token) window.location.href = 'login.html';

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, color) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'30px', left:'50%', transform:'translateX(-50%)',
    background:'var(--bg2)', border:`1px solid ${color||'var(--accent)'}`,
    color: color||'var(--accent)', padding:'8px 20px',
    fontFamily:'Share Tech Mono,monospace', fontSize:'0.75rem',
    letterSpacing:'1px', zIndex:'999', pointerEvents:'none'
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  closeReader();
  renderCourses();
}

function filterCourses() { renderCourses(); }

function renderCourses() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const grid   = document.getElementById('courses-grid');

  let filtered = allCourses.filter(c => {
    const cat = (c.category || '').toLowerCase();
    const matchTab = currentTab === 'all'
      || cat === currentTab.toLowerCase()
      || (currentTab === 'web' && cat.includes('web'))
      || (currentTab === 'bugbounty' && cat.includes('bug'));
    const matchSearch = !search
      || c.title.toLowerCase().includes(search)
      || (c.description || '').toLowerCase().includes(search);
    return matchTab && matchSearch;
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">// No courses found.</div>';
    return;
  }

  grid.innerHTML = filtered.map(c => {
    const isFree      = c.is_free || c.price === 0;
    const isVCLocked  = c.vc_locked && c.vc_cost > 0;
    // BUG FIX: detect misconfigured courses (vc_locked=true but vc_cost=0/null)
    const isMisconfigured = c.vc_locked && (!c.vc_cost || c.vc_cost <= 0);
    const isPurchased = c.is_purchased;

    let footerBadge, footerAction, clickAction, cardClass;

    if (isFree && !isVCLocked) {
      footerBadge  = '<span class="free-badge">FREE</span>';
      footerAction = '<span style="color:var(--accent);font-size:0.7rem;font-family:Share Tech Mono,monospace;">READ →</span>';
      clickAction  = `openCourse(${c.id})`;
      cardClass    = '';
    } else if (isPurchased) {
      footerBadge  = '<span class="free-badge">UNLOCKED</span>';
      footerAction = '<span style="color:var(--accent);font-size:0.7rem;font-family:Share Tech Mono,monospace;">READ →</span>';
      clickAction  = `openCourse(${c.id})`;
      cardClass    = '';
    } else if (isMisconfigured) {
      // BUG FIX: show disabled state instead of allowing free unlock
      footerBadge  = '<span class="price-badge" style="border-color:var(--text-dim);color:var(--text-dim);">UNAVAILABLE</span>';
      footerAction = '<span style="color:var(--text-dim);font-size:0.9rem;">⊘</span>';
      clickAction  = 'void(0)';
      cardClass    = 'disabled';
    } else if (isVCLocked) {
      footerBadge  = `<span class="price-badge" style="border-color:#f5c400;color:#f5c400;">⬡ ${c.vc_cost} VC</span>`;
      footerAction = '<span style="color:#f5c400;font-size:0.9rem;">🔒</span>';
      clickAction  = `openPayment(${c.id})`;
      cardClass    = 'locked';
    } else {
      footerBadge  = `<span class="price-badge">⬡ ${c.vc_cost || '?'} VC</span>`;
      footerAction = '<span class="lock-icon">🔒</span>';
      clickAction  = `openPayment(${c.id})`;
      cardClass    = 'locked';
    }

    return `
      <div class="course-card ${cardClass}" onclick="${clickAction}">
        <div class="course-category">${esc(c.category || 'General')}</div>
        <h3>${esc(c.title)}</h3>
        <p>${esc((c.description || '').substring(0, 120))}${(c.description||'').length > 120 ? '...' : ''}</p>
        <div class="course-footer">
          ${footerBadge}
          ${footerAction}
        </div>
      </div>`;
  }).join('');
}

async function openCourse(id) {
  const course = allCourses.find(c => c.id == id);
  if (!course) return;
  document.getElementById('reader-title').textContent = `// ${course.title}`;
  document.getElementById('reader-content').innerHTML = '<div class="loading"><span class="spinner"></span>Loading...</div>';
  document.getElementById('course-reader').classList.add('active');
  document.getElementById('course-reader').scrollIntoView({ behavior: 'smooth' });
  try {
    const res  = await fetch(`${API}/courses/${id}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (data.status === 'error' && data.message === 'NOT_PURCHASED') {
      document.getElementById('reader-content').innerHTML =
        '<div class="empty">// Access denied. Unlock this course to read it.</div>';
      return;
    }
    const raw = data.content || data.course?.content || 'No content available.';
    document.getElementById('reader-content').innerHTML = marked.parse(raw);
  } catch(e) {
    document.getElementById('reader-content').innerHTML =
      '<div class="empty">// Failed to load content.</div>';
  }
}

function closeReader() {
  document.getElementById('course-reader').classList.remove('active');
}

function openPayment(id) {
  const course = allCourses.find(c => c.id == id);
  if (!course) return;
  selectedCourse = course;
  const vcCost = course.vc_cost || 0;
  document.getElementById('pay-course-title').textContent = course.title;
  document.getElementById('pay-amount').textContent = `⬡ ${vcCost} VC`;
  // BUG FIX: always show live vcBalance (not stale cached value)
  document.getElementById('modal-vc-balance').textContent = `⬡ ${vcBalance.toLocaleString()} VC`;

  const payStatus = document.getElementById('pay-status');
  payStatus.style.display = 'none';
  payStatus.textContent = '';

  const btn = document.getElementById('btn-pay');
  btn.disabled = false;
  btn.textContent = '[ UNLOCK WITH VC ]';

  // Warn if balance insufficient
  if (vcBalance < vcCost) {
    payStatus.style.cssText = 'display:block;border:1px solid var(--accent3);color:var(--accent3);background:rgba(255,0,60,0.05);padding:10px 14px;font-family:Share Tech Mono,monospace;font-size:0.75rem;margin:10px 0;';
    payStatus.textContent = `// Not enough VC. You have ${vcBalance} VC, need ${vcCost} VC.`;
    btn.disabled = true;
  }

  document.getElementById('payment-modal').classList.add('active');
}

function closePayment() {
  document.getElementById('payment-modal').classList.remove('active');
  selectedCourse = null;
}

async function submitPayment() {
  if (!selectedCourse) return;
  const btn    = document.getElementById('btn-pay');
  const status = document.getElementById('pay-status');

  btn.disabled    = true;
  btn.textContent = '[ UNLOCKING... ]';

  try {
    const res  = await fetch(`${API}/courses/${selectedCourse.id}/unlock`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      // BUG FIX: include course_id in body as a safety reference for backend
      body:    JSON.stringify({ course_id: selectedCourse.id })
    });
    const data = await res.json();

    if (data.status === 'success') {
      // BUG FIX: update vcBalance from server response, sync to localStorage
      vcBalance = data.new_balance ?? vcBalance;
      localStorage.setItem('gv_vc', vcBalance);
      // Mark course as purchased locally so UI updates without re-fetch
      const c = allCourses.find(x => x.id == selectedCourse.id);
      if (c) c.is_purchased = true;
      closePayment();
      renderCourses();
      toast(`✓ Course unlocked! Balance: ⬡ ${vcBalance.toLocaleString()} VC`, '#f5c400');
    } else if (data.message === 'INSUFFICIENT_VC') {
      status.style.cssText = 'display:block;border:1px solid var(--accent3);color:var(--accent3);background:rgba(255,0,60,0.05);padding:10px 14px;font-family:Share Tech Mono,monospace;font-size:0.75rem;margin:10px 0;';
      status.textContent = `// Not enough VC. Need ${data.required} VC, have ${data.balance} VC.`;
      // BUG FIX: sync real balance from server error response
      if (data.balance !== undefined) {
        vcBalance = data.balance;
        localStorage.setItem('gv_vc', vcBalance);
      }
      btn.disabled    = false;
      btn.textContent = '[ UNLOCK WITH VC ]';
    } else {
      status.style.cssText = 'display:block;border:1px solid var(--accent3);color:var(--accent3);background:rgba(255,0,60,0.05);padding:10px 14px;font-family:Share Tech Mono,monospace;font-size:0.75rem;margin:10px 0;';
      status.textContent = data.message || '// Failed. Try again.';
      btn.disabled    = false;
      btn.textContent = '[ UNLOCK WITH VC ]';
    }
  } catch(e) {
    toast('Network error. Try again.', 'var(--accent3)');
    btn.disabled    = false;
    btn.textContent = '[ UNLOCK WITH VC ]';
  }
}

async function loadBalance() {
  try {
    const res  = await fetch(`${API}/vc/balance`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    // BUG FIX: check for 401 and redirect, don't silently fall back
    if (res.status === 401) { localStorage.removeItem('gv_token'); window.location.href = 'login.html'; return; }
    const data = await res.json();
    vcBalance = data.balance ?? data.vc_balance ?? 0;
    // Keep localStorage in sync for other pages
    localStorage.setItem('gv_vc', vcBalance);
  } catch(e) {
    // Network error only — use cached value
    vcBalance = parseInt(localStorage.getItem('gv_vc') || '0');
  }
}

async function loadCourses() {
  try {
    const res  = await fetch(`${API}/courses`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (data.status === 'error') {
      window.location.href = 'login.html';
      return;
    }
    allCourses = data.courses || [];
    renderCourses();
  } catch(e) {
    document.getElementById('courses-grid').innerHTML =
      '<div class="empty">// Failed to load courses.</div>';
  }
}

// BUG FIX: load balance FIRST so vcBalance is accurate before courses render
// and any payment modal opens. Using sequential await, not Promise.all,
// because renderCourses() reads vcBalance but doesn't use it directly —
// openPayment() does, and that only fires on user click, so parallel is fine.
async function init() {
  await Promise.all([loadBalance(), loadCourses()]);
}

init();
</script>
