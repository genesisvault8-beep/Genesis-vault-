<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tool Runner — Genesis Vault</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #c8d8e8;
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .glitch-line {
      position: fixed; left: 0; right: 0; height: 1px;
      background: rgba(255,0,60,0.4);
      animation: glitch-move 8s infinite; z-index: 1;
    }
    .glitch-line:nth-child(2) { animation-delay: 3s; background: rgba(0,255,136,0.3); }
    @keyframes glitch-move {
      0%   { top: -10%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 110%; opacity: 0; }
    }

    header {
      position: relative; z-index: 10;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0,255,136,0.2);
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo { font-family: 'Orbitron', monospace; font-size: 14px; letter-spacing: 3px; }
    .logo span:first-child { color: #00ff88; }
    .logo span:last-child  { color: #fff; }

    .back-btn {
      background: none; border: 1px solid rgba(0,255,136,0.4);
      color: #00ff88; padding: 6px 14px;
      font-family: 'Share Tech Mono', monospace; font-size: 12px;
      cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(0,255,136,0.1); border-color: #00ff88; }

    main {
      position: relative; z-index: 10;
      padding: 24px 20px; max-width: 620px; margin: 0 auto;
    }

    .tool-header { text-align: center; margin-bottom: 28px; }
    .tool-label  { font-size: 11px; color: rgba(0,255,136,0.6); letter-spacing: 4px; margin-bottom: 8px; }
    .tool-name   {
      font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 700;
      color: #fff; text-shadow: 0 0 20px rgba(0,255,136,0.5); letter-spacing: 2px;
    }
    .tool-desc-text {
      font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 8px; line-height: 1.6;
    }
    .tool-id-badge {
      display: inline-block; margin-top: 8px;
      border: 1px solid rgba(0,255,136,0.4); color: #00ff88;
      padding: 3px 12px; font-size: 11px; letter-spacing: 2px;
    }
    .tool-type-badge {
      display: inline-block; margin-top: 6px; margin-left: 6px;
      border: 1px solid rgba(0,168,255,0.4); color: #00a8ff;
      padding: 3px 12px; font-size: 11px; letter-spacing: 2px;
    }

    .panel {
      border: 1px solid rgba(0,255,136,0.2);
      background: rgba(0,255,136,0.02);
      padding: 20px; margin-bottom: 16px; position: relative;
    }
    .panel::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 3px; height: 100%; background: #00ff88;
    }
    .panel-label {
      font-size: 10px; color: rgba(0,255,136,0.5);
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px;
    }

    /* Dynamic inputs */
    .param-group { margin-bottom: 14px; }
    .param-label {
      display: block; font-size: 10px; color: rgba(0,255,136,0.5);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
    }
    .param-hint { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 5px; letter-spacing: 1px; }

    .input-wrap {
      display: flex; align-items: center;
      border: 1px solid rgba(0,255,136,0.3);
      background: rgba(0,0,0,0.6); padding: 0 14px; transition: border-color 0.2s;
    }
    .input-wrap:focus-within { border-color: #00ff88; box-shadow: 0 0 12px rgba(0,255,136,0.15); }
    .input-prefix { color: #00ff88; font-size: 14px; margin-right: 8px; user-select: none; }

    input, textarea, select {
      flex: 1; background: none; border: none; color: #e0f0e0;
      font-family: 'Share Tech Mono', monospace; font-size: 14px;
      padding: 12px 0; outline: none; width: 100%;
    }
    textarea {
      padding: 12px; resize: vertical; min-height: 80px;
      border: 1px solid rgba(0,255,136,0.3); background: rgba(0,0,0,0.6);
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #00ff88; box-shadow: 0 0 12px rgba(0,255,136,0.15); }
    select {
      background: rgba(0,0,0,0.6); border: 1px solid rgba(0,255,136,0.3);
      cursor: pointer; padding: 12px; color: #e0f0e0;
    }
    select option { background: #0a1520; }
    select:focus { border-color: #00ff88; }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.2); }

    .run-btn {
      width: 100%; background: #00ff88; color: #000; border: none; padding: 16px;
      font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700;
      letter-spacing: 3px; cursor: pointer; position: relative; overflow: hidden; transition: all 0.2s;
    }
    .run-btn::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.4s;
    }
    .run-btn:hover::before { left: 100%; }
    .run-btn:hover { background: #00cc66; box-shadow: 0 0 20px rgba(0,255,136,0.4); }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .terminal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .terminal-dots { display: flex; gap: 6px; }
    .terminal-dots span { width: 10px; height: 10px; border-radius: 50%; }
    .dot-red    { background: #ff5f56; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green  { background: #27c93f; }

    .copy-btn {
      background: none; border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.4); padding: 4px 10px;
      font-family: 'Share Tech Mono', monospace; font-size: 11px;
      cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
    }
    .copy-btn:hover { color: #00ff88; border-color: #00ff88; }

    pre#output {
      background: rgba(0,0,0,0.8); border: 1px solid rgba(0,255,136,0.15);
      padding: 16px; font-family: 'Share Tech Mono', monospace;
      font-size: 12px; line-height: 1.7; white-space: pre-wrap; word-break: break-all;
      min-height: 180px; max-height: 380px; overflow-y: auto; color: #7fff7f;
    }
    pre#output.idle    { color: rgba(255,255,255,0.2); }
    pre#output.running { color: rgba(0,255,136,0.5); animation: blink 1s infinite; }
    pre#output.error   { color: #ff4444; }
    pre#output.success { color: #7fff7f; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .status-bar {
      display: flex; align-items: center; gap: 10px; margin-top: 12px;
      font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 1px;
    }
    .status-indicator { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); }
    .status-indicator.green  { background: #00ff88; box-shadow: 0 0 6px #00ff88; }
    .status-indicator.red    { background: #ff4444; box-shadow: 0 0 6px #ff4444; }
    .status-indicator.yellow { background: #ffaa00; animation: blink 0.8s infinite; }

    .loading-panel {
      text-align: center; padding: 40px;
      color: rgba(0,255,136,0.4); font-size: 12px; letter-spacing: 3px;
    }
    .error-panel {
      border: 1px solid rgba(255,68,68,0.4); background: rgba(255,0,0,0.04);
      padding: 20px; text-align: center; color: #ff4444; font-size: 13px;
    }

    pre::-webkit-scrollbar { width: 4px; }
    pre::-webkit-scrollbar-track { background: #000; }
    pre::-webkit-scrollbar-thumb { background: rgba(0,255,136,0.3); }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="glitch-line"></div>
  <div class="glitch-line"></div>

  <header>
    <div class="logo"><span>GENESIS</span><span>VAULT</span></div>
    <button class="back-btn" onclick="history.back()">← BACK</button>
  </header>

  <main>
    <div class="tool-header">
      <div class="tool-label">// TOOL RUNNER</div>
      <div class="tool-name" id="tool-name">LOADING...</div>
      <div id="tool-desc-text" class="tool-desc-text"></div>
      <div>
        <span class="tool-id-badge" id="tool-badge">TOOL_ID: --</span>
        <span class="tool-type-badge" id="tool-type-badge">--</span>
      </div>
    </div>

    <div id="main-content">
      <div class="loading-panel">// LOADING TOOL DATA...</div>
    </div>

    <button class="run-btn" id="run-btn" onclick="runTool()" style="display:none;">▶ EXECUTE TOOL</button>

    <div class="panel" id="output-panel" style="margin-top:16px; display:none;">
      <div class="terminal-header">
        <div class="terminal-dots">
          <span class="dot-red"></span>
          <span class="dot-yellow"></span>
          <span class="dot-green"></span>
        </div>
        <span class="panel-label" style="margin:0;">// SYS OUTPUT</span>
        <button class="copy-btn" onclick="copyOutput()">COPY</button>
      </div>
      <pre id="output" class="idle">> awaiting execution...</pre>
      <div class="status-bar">
        <div class="status-indicator" id="status-dot"></div>
        <span id="status-text">IDLE</span>
      </div>
    </div>
  </main>

<script>
  const params  = new URLSearchParams(window.location.search);
  const TOOL_ID = parseInt(params.get('tool_id') || params.get('id')) || 0;
  const API     = 'https://genesis-vault-backend.onrender.com/api';

  let toolData = null;

  function getToken() {
    return localStorage.getItem('gv_token') ||
           localStorage.getItem('token') ||
           sessionStorage.getItem('token') || '';
  }

  function h() {
    return {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${getToken()}`,
      'Origin': 'https://genesisvault8-beep.github.io'
    };
  }

  function setStatus(state, text) {
    document.getElementById('status-dot').className = 'status-indicator ' + state;
    document.getElementById('status-text').textContent = text;
  }

  function copyOutput() {
    const output = document.getElementById('output');
    navigator.clipboard.writeText(output.textContent)
      .then(() => { document.getElementById('status-text').textContent = 'COPIED TO CLIPBOARD'; })
      .catch(() => alert('Select text manually to copy'));
  }

  // ── Load tool data from API ──────────────────────────────────────
  async function boot() {
    if (!TOOL_ID) {
      showError('No tool_id specified in URL.');
      return;
    }
    const token = getToken();
    if (!token) {
      location.href = 'login.html';
      return;
    }
    try {
      // Fetch from marketplace to get tool details
      const res  = await fetch(`${API}/marketplace`, { headers: h() });
      const data = await res.json();
      if (res.status === 401) { location.href = 'login.html'; return; }

      const tools = data.tools || [];
      toolData    = tools.find(t => String(t.id) === String(TOOL_ID));

      if (!toolData) {
        showError('Tool not found or not owned. Go back and purchase this tool first.');
        return;
      }
      if (!toolData.owned) {
        showError('You do not own this tool. Purchase it from the marketplace to access it.');
        return;
      }

      renderToolUI(toolData);
    } catch (e) {
      showError('Failed to load tool data. Check your connection.');
    }
  }

  function showError(msg) {
    document.getElementById('main-content').innerHTML =
      `<div class="error-panel">> ERROR: ${msg}</div>`;
  }

  // ── Render dynamic input fields from params_schema ───────────────
  function renderToolUI(tool) {
    document.getElementById('tool-name').textContent  = tool.title || `TOOL #${TOOL_ID}`;
    document.getElementById('tool-badge').textContent = `TOOL_ID: ${TOOL_ID}`;
    document.getElementById('tool-desc-text').textContent = tool.description || '';

    const runType = (tool.tool_run_type || 'security').toLowerCase();
    const typeLabelMap = { security: 'SECURITY', automation: 'AUTOMATION', script: 'SCRIPT', ai: 'AI TOOL' };
    document.getElementById('tool-type-badge').textContent = typeLabelMap[runType] || runType.toUpperCase();

    // Parse params_schema — array of { name, type, label, placeholder, hint, options }
    let schema = [];
    try {
      if (tool.params_schema) {
        schema = typeof tool.params_schema === 'string'
          ? JSON.parse(tool.params_schema)
          : tool.params_schema;
      }
    } catch(e) {}

    // AI tools: default to a single textarea called "input"
    if (runType === 'ai' && (!schema || !schema.length)) {
      schema = [{
        name:        'input',
        type:        'textarea',
        label:       tool.input_label || 'YOUR INPUT',
        placeholder: tool.input_label || 'Type your question or paste your data here...',
        hint:        'Rate limit: 30 AI requests per day'
      }];
    }

    // Default schema for security/automation: just a "target" field
    if (!schema || !schema.length) {
      schema = [{ name: 'target', type: 'text', label: 'TARGET NODE', placeholder: 'Domain or IP (e.g. scanme.nmap.org)', hint: '> DOMAIN OR IP ONLY — NO SPECIAL CHARS' }];
    }

    const content = document.getElementById('main-content');
    content.innerHTML = `
      <div class="panel">
        <div class="panel-label">// INPUT PARAMETERS</div>
        <div id="params-container"></div>
      </div>
    `;

    const container = document.getElementById('params-container');
    schema.forEach(field => {
      const group = document.createElement('div');
      group.className = 'param-group';

      const label = document.createElement('label');
      label.className = 'param-label';
      label.textContent = field.label || field.name.toUpperCase();
      group.appendChild(label);

      if (field.type === 'textarea') {
        const ta = document.createElement('textarea');
        ta.id = 'param_' + field.name;
        ta.className = 'tool-param';
        ta.dataset.name = field.name;
        ta.placeholder = field.placeholder || '';
        group.appendChild(ta);

      } else if (field.type === 'select' && field.options) {
        const sel = document.createElement('select');
        sel.id = 'param_' + field.name;
        sel.className = 'tool-param';
        sel.dataset.name = field.name;
        field.options.forEach(opt => {
          const o = document.createElement('option');
          o.value = typeof opt === 'object' ? opt.value : opt;
          o.textContent = typeof opt === 'object' ? opt.label : opt;
          sel.appendChild(o);
        });
        group.appendChild(sel);

      } else {
        const wrap = document.createElement('div');
        wrap.className = 'input-wrap';
        const prefix = document.createElement('span');
        prefix.className = 'input-prefix';
        prefix.textContent = '$';
        wrap.appendChild(prefix);
        const inp = document.createElement('input');
        inp.id = 'param_' + field.name;
        inp.className = 'tool-param';
        inp.dataset.name = field.name;
        inp.type = field.type === 'number' ? 'number' : 'text';
        inp.placeholder = field.placeholder || '';
        inp.autocomplete = 'off';
        inp.autocorrect = 'off';
        inp.autocapitalize = 'off';
        inp.spellcheck = false;
        if (field.value !== undefined) inp.value = field.value;
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') runTool(); });
        wrap.appendChild(inp);
        group.appendChild(wrap);
      }

      if (field.hint) {
        const hint = document.createElement('p');
        hint.className = 'param-hint';
        hint.textContent = '> ' + field.hint;
        group.appendChild(hint);
      }

      container.appendChild(group);
    });

    document.getElementById('run-btn').style.display = 'block';
    document.getElementById('output-panel').style.display = 'block';
  }

  // ── Run the tool ─────────────────────────────────────────────────
  async function runTool() {
    const output  = document.getElementById('output');
    const runBtn  = document.getElementById('run-btn');

    // Collect all params
    const params = {};
    document.querySelectorAll('.tool-param').forEach(el => {
      params[el.dataset.name] = el.value.trim();
    });

    // Validate at least one non-empty value
    const allEmpty = Object.values(params).every(v => !v);
    if (allEmpty) {
      output.textContent = '> ERROR: please fill in at least one parameter.';
      output.className = 'error';
      setStatus('red', 'NO INPUT');
      return;
    }

    const token = getToken();
    if (!token) { location.href = 'login.html'; return; }

    runBtn.disabled = true;
    runBtn.textContent = '⏳ EXECUTING...';
    output.textContent = '> initializing...\n> sending to backend...\n> running (max 30s)...';
    output.className = 'running';
    setStatus('yellow', 'RUNNING...');

    try {
      const res = await fetch(`${API}/tools/run`, {
        method: 'POST',
        headers: h(),
        body: JSON.stringify({ tool_id: TOOL_ID, params }),
      });

      if (res.status === 401) { location.href = 'login.html'; return; }
      if (res.status === 429) {
        const errData = await res.json();
        output.textContent = '> RATE LIMIT REACHED\n> ' + (errData.message || 'Daily AI limit reached. Resets at midnight UTC.');
        output.className = 'error';
        setStatus('red', 'RATE LIMITED');
        runBtn.disabled = false;
        runBtn.textContent = '▶ EXECUTE TOOL';
        return;
      }

      const data = await res.json();

      if (data.status === 'success') {
        output.textContent = data.output;
        output.className = 'success';
        const exitLabel = data.source === 'ai' ? 'AI' : `EXIT ${data.return_code ?? 0}`;
        setStatus('green', `COMPLETE — ${exitLabel}`);
      } else {
        output.textContent = '> ERROR: ' + (data.message || 'Unknown error');
        output.className = 'error';
        setStatus('red', 'FAILED');
      }
    } catch (err) {
      output.textContent = '> NETWORK ERROR\n> ' + err.message;
      output.className = 'error';
      setStatus('red', 'NETWORK ERROR');
    }

    runBtn.disabled = false;
    runBtn.textContent = '▶ EXECUTE TOOL';
  }

  boot();
</script>
</body>
</html>
