<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Vault | Access</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020608;
    --bg2: #060d10;
    --accent: #00f5c4;
    --accent2: #00a8ff;
    --accent3: #ff003c;
    --text: #c8e6f0;
    --text-dim: #4a7a8a;
    --border: #0f2a35;
    --glow: 0 0 20px rgba(0,245,196,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .logo {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease;
  }

  .logo a {
    text-decoration: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.4rem;
    letter-spacing: 4px;
  }

  .logo a span:first-child { color: var(--accent); }
  .logo a span:last-child { color: white; }

  .logo p {
    color: var(--text-dim);
    font-size: 0.75rem;
    letter-spacing: 3px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 36px 32px;
    animation: fadeUp 0.6s ease;
  }

  .card h2 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: white;
  }

  .card .sub {
    color: var(--text-dim);
    font-size: 0.85rem;
    letter-spacing: 1px;
    margin-bottom: 28px;
    font-family: 'Share Tech Mono', monospace;
  }

  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .form-group {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* Password wrapper for show/hide toggle */
  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrapper input {
    width: 100%;
    padding-right: 44px;
  }

  .toggle-pw {
    position: absolute;
    right: 12px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 1rem;
    padding: 0;
    line-height: 1;
    transition: color 0.2s;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 1px;
  }

  .toggle-pw:hover { color: var(--accent); }

  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: var(--glow);
  }

  input::placeholder { color: var(--text-dim); }

  .btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn:hover {
    background: white;
    box-shadow: var(--glow);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .error {
    background: rgba(255,0,60,0.1);
    border: 1px solid var(--accent3);
    color: var(--accent3);
    padding: 10px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 16px;
    display: none;
    line-height: 1.5;
  }

  .success {
    background: rgba(0,245,196,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 16px;
    display: none;
  }

  .form-panel { display: none; }
  .form-panel.active { display: block; }

  .referral-note {
    color: var(--text-dim);
    font-size: 0.75rem;
    font-family: 'Share Tech Mono', monospace;
    margin-top: 16px;
    text-align: center;
    letter-spacing: 1px;
  }

  .back-link {
    text-align: center;
    margin-top: 24px;
    animation: fadeUp 0.8s ease;
  }

  .back-link a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
    transition: color 0.2s;
  }

  .back-link a:hover { color: var(--accent); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .scanner {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 3s linear infinite;
    z-index: 0;
  }

  @keyframes scan {
    0% { top: 0; opacity: 1; }
    100% { top: 100vh; opacity: 0; }
  }

  /* Password strength bar */
  .strength-bar {
    height: 3px;
    background: var(--border);
    margin-top: 6px;
    position: relative;
    overflow: hidden;
  }

  .strength-fill {
    height: 100%;
    width: 0%;
    transition: width 0.3s, background 0.3s;
  }

  .strength-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 2px;
    margin-top: 4px;
    color: var(--text-dim);
  }

  /* ── WAKE-UP OVERLAY ── */
  #wakeup-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #wakeup-overlay.active { display: flex; }

  .wakeup-logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1rem;
    letter-spacing: 5px;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .wakeup-logo span { color: white; }

  .wakeup-sub {
    font-size: 0.58rem;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 48px;
  }

  .wakeup-bars {
    display: flex;
    gap: 5px;
    margin-bottom: 40px;
  }

  .wakeup-bar {
    width: 3px;
    height: 32px;
    background: var(--border);
    animation: barPulse 1.2s ease-in-out infinite;
  }
  .wakeup-bar:nth-child(1) { animation-delay: 0s; }
  .wakeup-bar:nth-child(2) { animation-delay: 0.1s; }
  .wakeup-bar:nth-child(3) { animation-delay: 0.2s; }
  .wakeup-bar:nth-child(4) { animation-delay: 0.3s; }
  .wakeup-bar:nth-child(5) { animation-delay: 0.4s; }
  .wakeup-bar:nth-child(6) { animation-delay: 0.5s; }
  .wakeup-bar:nth-child(7) { animation-delay: 0.6s; }
  .wakeup-bar:nth-child(8) { animation-delay: 0.7s; }

  @keyframes barPulse {
    0%, 100% { background: var(--border); transform: scaleY(1); }
    50% { background: var(--accent); transform: scaleY(1.8); }
  }

  .wakeup-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 2px;
    text-align: center;
    min-height: 20px;
    margin-bottom: 12px;
  }

  .wakeup-log {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    color: var(--text-dim);
    letter-spacing: 1px;
    width: 100%;
    max-width: 340px;
    min-height: 80px;
    border: 1px solid var(--border);
    padding: 12px;
    background: var(--bg2);
    line-height: 2;
  }

  .wakeup-log .log-line { display: block; animation: wFadeIn 0.3s ease; }
  .wakeup-log .log-ok   { color: var(--accent); }
  .wakeup-log .log-wait { color: var(--accent2); }
  .wakeup-log .log-warn { color: #ffaa00; }

  @keyframes wFadeIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .wakeup-timer {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    color: #1a3a3a;
    letter-spacing: 2px;
    margin-top: 16px;
  }
</style>
</head>
<body>

<div class="scanner"></div>

<div class="container">
  <div class="logo">
    <a href="index.html"><span>GENESIS</span><span>VAULT</span></a>
    <p>// Secure Access Terminal</p>
  </div>

  <div class="card">
    <h2>Authentication</h2>
    <p class="sub">$ vault --authenticate</p>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Login</div>
      <div class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <div id="error-msg" class="error"></div>
    <div id="success-msg" class="success"></div>

    <!-- LOGIN FORM -->
    <div id="panel-login" class="form-panel active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="hunter@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
          <button class="toggle-pw" type="button" onclick="togglePw('login-password', this)">SHOW</button>
        </div>
      </div>
      <button class="btn" onclick="handleLogin()" id="login-btn">[ ACCESS VAULT ]</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="panel-register" class="form-panel">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="your_handle" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="hunter@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="reg-password" placeholder="min 8 characters"
            autocomplete="new-password" oninput="checkStrength(this.value)">
          <button class="toggle-pw" type="button" onclick="togglePw('reg-password', this)">SHOW</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="form-group">
        <label>Invite Code</label>
        <input type="text" id="reg-referral" placeholder="XXXXXXXX"
          oninput="this.value = this.value.toUpperCase()"
          maxlength="8" autocomplete="off">
      </div>
      <button class="btn" onclick="handleRegister()" id="reg-btn">[ JOIN THE VAULT ]</button>
      <p class="referral-note">// Invite only. Request access to receive a code.</p>
    </div>
  </div>

  <div class="back-link">
    <a href="index.html">← Return to base</a>
  </div>
</div>

<!-- ── WAKE-UP OVERLAY ── -->
<div id="wakeup-overlay">
  <div class="wakeup-logo">GENESIS<span>VAULT</span></div>
  <div class="wakeup-sub">// CONNECTING TO SECURE NODE</div>
  <div class="wakeup-bars">
    <div class="wakeup-bar"></div>
    <div class="wakeup-bar"></div>
    <div class="wakeup-bar"></div>
    <div class="wakeup-bar"></div>
    <div class="wakeup-bar"></div>
    <div class="wakeup-bar"></div>
    <div class="wakeup-bar"></div>
    <div class="wakeup-bar"></div>
  </div>
  <div class="wakeup-status" id="wakeup-status">Initializing...</div>
  <div class="wakeup-log" id="wakeup-log"></div>
  <div class="wakeup-timer" id="wakeup-timer"></div>
</div>

<script>
  const API = 'https://genesis-vault-backend.onrender.com/api';

  let backendReady = false;
  let wakeTimerInterval = null;
  let wakeStartTime = null;

  // ── WAKE-UP MESSAGES ────────────────────────────────────────────────
  const WAKE_MESSAGES = [
    'Connecting to vault node...',
    'Initializing secure tunnel...',
    'Syncing authentication layer...',
    'Verifying node integrity...',
    'Loading access protocols...',
    'Establishing session...',
    'Almost ready...',
    'Finalizing connection...'
  ];

  // ── WAKE-UP OVERLAY HELPERS ─────────────────────────────────────────
  function showWakeup() {
    document.getElementById('wakeup-overlay').classList.add('active');
    wakeStartTime = Date.now();
    wakeTimerInterval = setInterval(() => {
      const secs = Math.floor((Date.now() - wakeStartTime) / 1000);
      document.getElementById('wakeup-timer').textContent = `ELAPSED: ${secs}s`;
    }, 1000);
  }

  function hideWakeup() {
    document.getElementById('wakeup-overlay').classList.remove('active');
    clearInterval(wakeTimerInterval);
  }

  function setWakeupStatus(msg) {
    document.getElementById('wakeup-status').textContent = msg;
  }

  function addLog(msg, type = 'log-wait') {
    const log = document.getElementById('wakeup-log');
    const line = document.createElement('span');
    line.className = `log-line ${type}`;
    line.textContent = `> ${msg}`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
    const lines = log.querySelectorAll('.log-line');
    if (lines.length > 5) lines[0].remove();
  }

  // ── BACKGROUND PING — warms server silently on page load ────────────
  async function warmBackend() {
    try {
      await fetch(`${API}/ping`, { method: 'GET', signal: AbortSignal.timeout(60000) });
      backendReady = true;
    } catch(e) {
      backendReady = false;
    }
  }

  // ── WAIT FOR BACKEND WITH VISUAL FEEDBACK ───────────────────────────
  async function waitForBackend() {
    if (backendReady) return true;
    showWakeup();
    let msgIndex = 0;

    for (let attempt = 0; attempt < 12; attempt++) {
      const msg = WAKE_MESSAGES[Math.min(msgIndex, WAKE_MESSAGES.length - 1)];
      setWakeupStatus(msg);
      addLog(msg, 'log-wait');
      msgIndex++;

      try {
        const res = await fetch(`${API}/ping`, {
          method: 'GET',
          signal: AbortSignal.timeout(8000)
        });
        if (res.ok || res.status < 500) {
          addLog('Vault online!', 'log-ok');
          setWakeupStatus('Connection established. Proceeding...');
          await sleep(800);
          hideWakeup();
          backendReady = true;
          return true;
        }
      } catch(e) {
        addLog(`Retry ${attempt + 1}/12...`, 'log-warn');
      }
      await sleep(5000);
    }

    hideWakeup();
    return false;
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  // ── TAB SWITCHING ────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`.tab:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
    document.getElementById(`panel-${tab}`).classList.add('active');
    hideMessages();
  }

  // ── MESSAGES ─────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = '// ERROR: ' + msg;
    el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = '// ' + msg;
    el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }

  // ── SHOW/HIDE PASSWORD ────────────────────────────────────────────────
  function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
      input.type = 'text';
      btn.textContent = 'HIDE';
      btn.style.color = 'var(--accent)';
    } else {
      input.type = 'password';
      btn.textContent = 'SHOW';
      btn.style.color = 'var(--text-dim)';
    }
  }

  // ── PASSWORD STRENGTH ─────────────────────────────────────────────────
  function checkStrength(val) {
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    let strength = 0;
    if (val.length >= 8) strength++;
    if (val.length >= 12) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;

    const levels = [
      { pct: '0%',   color: 'transparent', text: '' },
      { pct: '25%',  color: '#ff003c',     text: '// WEAK' },
      { pct: '50%',  color: '#ff9500',     text: '// FAIR' },
      { pct: '75%',  color: '#00a8ff',     text: '// GOOD' },
      { pct: '90%',  color: '#00f5c4',     text: '// STRONG' },
      { pct: '100%', color: '#00f5c4',     text: '// STRONG' },
    ];

    const lvl = levels[strength] || levels[0];
    fill.style.width = lvl.pct;
    fill.style.background = lvl.color;
    label.textContent = lvl.text;
    label.style.color = lvl.color;
  }

  // ── FRIENDLY ERROR MESSAGES ───────────────────────────────────────────
  function friendlyError(code) {
    const map = {
      'AUTH_FAILED': 'Invalid email or password.',
      'ACCOUNT_BANNED': 'This account has been suspended.',
      'INVALID_INVITE_CODE': 'Invalid invite code. Contact the Architect for a valid code.',
      'INVITE_CODE_REQUIRED': 'An invite code is required to register.',
      'ALREADY_REQUESTED': 'This email has already requested access.',
      'ALREADY_APPROVED': 'This email is already approved. Check your invite code.',
      'EMAIL_REQUIRED': 'Email is required.',
      'INVALID_EMAIL': 'Please enter a valid email address.',
      'PASSWORD_TOO_SHORT': 'Password must be at least 8 characters.',
    };
    return map[code] || code;
  }

  // ── LOGIN ─────────────────────────────────────────────────────────────
  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const btn = document.getElementById('login-btn');

    if (!email || !password) return showError('All fields required.');

    btn.disabled = true;
    btn.textContent = '[ AUTHENTICATING... ]';
    hideMessages();

    // Show wake-up screen if backend isn't warm yet
    if (!backendReady) {
      const ready = await waitForBackend();
      if (!ready) {
        showError('Server unreachable. Please try again in a moment.');
        btn.disabled = false;
        btn.textContent = '[ ACCESS VAULT ]';
        return;
      }
    }

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showError(friendlyError(data.message || 'Login failed.'));
        btn.disabled = false;
        btn.textContent = '[ ACCESS VAULT ]';
      } else {
        localStorage.setItem('gv_token', data.token);
        localStorage.setItem('gv_rank', data.rank);
        localStorage.setItem('gv_email', data.email);
        showSuccess('Access granted. Redirecting...');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      }
    } catch (e) {
      // Auto-retry once on network error
      try {
        await sleep(4000);
        const retry = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await retry.json();
        if (retry.ok) {
          localStorage.setItem('gv_token', data.token);
          localStorage.setItem('gv_rank', data.rank);
          localStorage.setItem('gv_email', data.email);
          showSuccess('Access granted. Redirecting...');
          setTimeout(() => window.location.href = 'dashboard.html', 1000);
          return;
        }
      } catch(e2) {}
      showError('Connection failed. Server may be starting up — please try again.');
      btn.disabled = false;
      btn.textContent = '[ ACCESS VAULT ]';
    }
  }

  // ── REGISTER ──────────────────────────────────────────────────────────
  async function handleRegister() {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const referral_code = document.getElementById('reg-referral').value.trim().toUpperCase();
    const btn = document.getElementById('reg-btn');

    if (!username || !email || !password) return showError('All fields required.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');
    if (!referral_code) return showError('An invite code is required to register.');

    btn.disabled = true;
    btn.textContent = '[ PROCESSING... ]';
    hideMessages();

    // Show wake-up screen if backend isn't warm yet
    if (!backendReady) {
      const ready = await waitForBackend();
      if (!ready) {
        showError('Server unreachable. Please try again in a moment.');
        btn.disabled = false;
        btn.textContent = '[ JOIN THE VAULT ]';
        return;
      }
    }

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, username, referral_code })
      });
      const data = await res.json();

      if (!res.ok) {
        showError(friendlyError(data.message || 'Registration failed.'));
        btn.disabled = false;
        btn.textContent = '[ JOIN THE VAULT ]';
      } else {
        localStorage.setItem('gv_token', data.token);
        localStorage.setItem('gv_rank', data.rank || 'Ghost');
        localStorage.setItem('gv_email', data.email);
        showSuccess('Account created! Welcome to the Vault.');
        setTimeout(() => window.location.href = 'dashboard.html', 1500);
      }
    } catch (e) {
      showError('Connection failed. Server may be starting up — please try again.');
      btn.disabled = false;
      btn.textContent = '[ JOIN THE VAULT ]';
    }
  }

  // ── REDIRECT IF ALREADY LOGGED IN ────────────────────────────────────
  if (localStorage.getItem('gv_token')) {
    window.location.href = 'dashboard.html';
  }

  // ── WARM BACKEND SILENTLY ON PAGE LOAD ───────────────────────────────
  warmBackend();

  // ── ENTER KEY SUPPORT ─────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const activePanel = document.querySelector('.form-panel.active');
      if (activePanel && activePanel.id === 'panel-login') handleLogin();
      else if (activePanel && activePanel.id === 'panel-register') handleRegister();
    }
  });
</script>
</body>
</html>
