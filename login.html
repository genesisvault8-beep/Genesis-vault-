<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genesis Vault | Access</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #020608;
    --bg2:     #060d10;
    --accent:  #00f5c4;
    --accent2: #00a8ff;
    --accent3: #ff003c;
    --text:    #c8e6f0;
    --text-dim:#4a7a8a;
    --border:  #0f2a35;
    --glow:    0 0 20px rgba(0,245,196,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* Grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
    );
    pointer-events: none; z-index: 1;
  }

  .scanner {
    position: fixed; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 3s linear infinite;
    z-index: 10;
  }
  @keyframes scan {
    0%   { top: 0;     opacity: 1; }
    100% { top: 100vh; opacity: 0; }
  }

  .container {
    position: relative; z-index: 2;
    width: 100%; max-width: 420px;
    padding: 20px;
  }

  /* LOGO */
  .logo {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeDown 0.5s ease;
  }
  .logo-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.4rem; letter-spacing: 4px;
    text-decoration: none;
  }
  .logo-text .g { color: var(--accent); }
  .logo-text .v { color: white; }
  .logo p {
    color: var(--text-dim);
    font-size: 0.72rem; letter-spacing: 3px;
    margin-top: 6px; text-transform: uppercase;
    font-family: 'Share Tech Mono', monospace;
  }

  /* CARD */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 32px 28px;
    animation: fadeUp 0.5s ease;
    position: relative;
  }
  .card::before {
    content: '// SECURE ACCESS TERMINAL';
    position: absolute; top: 0; right: 14px;
    transform: translateY(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem; color: var(--accent);
    letter-spacing: 2px; background: var(--bg2); padding: 0 6px;
  }

  .card h2 {
    font-size: 1.3rem; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 4px; color: white;
  }
  .card .sub {
    color: var(--text-dim); font-size: 0.78rem;
    letter-spacing: 1px; margin-bottom: 24px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* TABS */
  .tabs {
    display: flex; gap: 0;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1; padding: 10px; text-align: center;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600; font-size: 0.85rem;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MESSAGES */
  .msg-box {
    padding: 10px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem; margin-bottom: 16px;
    display: none; line-height: 1.5; letter-spacing: 0.5px;
  }
  .msg-box.error {
    background: rgba(255,0,60,0.08);
    border: 1px solid var(--accent3);
    color: var(--accent3);
  }
  .msg-box.success {
    background: rgba(0,245,196,0.08);
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .msg-box.info {
    background: rgba(0,168,255,0.08);
    border: 1px solid var(--accent2);
    color: var(--accent2);
  }

  /* FORMS */
  .form-panel { display: none; }
  .form-panel.active { display: block; }

  .form-group { margin-bottom: 16px; }

  label {
    display: block;
    font-size: 0.68rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 7px;
    font-family: 'Share Tech Mono', monospace;
  }
  label .optional {
    color: #1e4a5a; font-size: 0.6rem; letter-spacing: 1px;
  }

  .input-wrapper { position: relative; display: flex; align-items: center; }
  .input-wrapper input { width: 100%; padding-right: 50px; }

  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.5px;
  }
  input:focus { border-color: var(--accent); box-shadow: var(--glow); }
  input::placeholder { color: var(--text-dim); }

  .toggle-pw {
    position: absolute; right: 12px;
    background: none; border: none; cursor: pointer;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; letter-spacing: 1px;
    padding: 0; transition: color 0.2s;
  }
  .toggle-pw:hover { color: var(--accent); }

  /* PASSWORD STRENGTH */
  .strength-bar {
    height: 3px; background: var(--border);
    margin-top: 6px; overflow: hidden;
  }
  .strength-fill {
    height: 100%; width: 0%;
    transition: width 0.3s, background 0.3s;
  }
  .strength-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem; letter-spacing: 2px;
    margin-top: 4px; color: var(--text-dim);
  }

  /* REFERRAL FIELD */
  .referral-wrap {
    position: relative;
  }
  .referral-badge {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem; color: var(--accent);
    letter-spacing: 1px; display: none;
  }

  /* VC BONUS HINT */
  .vc-hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; color: var(--accent);
    letter-spacing: 1px; margin-top: 5px;
    display: none;
  }

  /* BUTTONS */
  .btn {
    width: 100%; padding: 13px;
    background: var(--accent); color: var(--bg);
    border: none;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700; font-size: 0.95rem;
    letter-spacing: 3px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    margin-top: 6px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn:hover { background: white; box-shadow: var(--glow); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.btn-secondary {
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); clip-path: none;
    font-size: 0.8rem; letter-spacing: 2px;
  }
  .btn.btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); box-shadow: none; }

  /* FORGOT + LINKS */
  .forgot-link {
    text-align: right; margin-top: -8px; margin-bottom: 14px;
  }
  .forgot-link a {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem; color: var(--text-dim);
    text-decoration: none; letter-spacing: 1px;
    transition: color 0.2s;
  }
  .forgot-link a:hover { color: var(--accent2); }

  .divider {
    text-align: center; margin: 16px 0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem; color: var(--border);
    letter-spacing: 2px; position: relative;
  }
  .divider::before, .divider::after {
    content: ''; position: absolute; top: 50%;
    width: 38%; height: 1px; background: var(--border);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  /* SIGNUP STARTER INFO */
  .starter-info {
    display: flex; gap: 10px; margin-bottom: 18px;
  }
  .starter-box {
    flex: 1; background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px 8px; text-align: center;
  }
  .starter-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem; color: var(--accent);
    display: block; line-height: 1; margin-bottom: 4px;
  }
  .starter-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.52rem; color: var(--text-dim);
    letter-spacing: 1px; display: block;
  }

  .back-link {
    text-align: center; margin-top: 20px;
    animation: fadeUp 0.8s ease;
  }
  .back-link a {
    color: var(--text-dim); text-decoration: none;
    font-size: 0.72rem; letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
    transition: color 0.2s;
  }
  .back-link a:hover { color: var(--accent); }

  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-16px); }
    to   { opacity:1; transform:none; }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:none; }
  }

  /* ── WAKE-UP OVERLAY ── */
  #wakeup-overlay {
    display: none; position: fixed; inset: 0;
    background: var(--bg); z-index: 1000;
    flex-direction: column; align-items: center;
    justify-content: center; padding: 20px;
  }
  #wakeup-overlay.active { display: flex; }

  .wakeup-logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.1rem; letter-spacing: 5px;
    color: var(--accent); margin-bottom: 6px;
  }
  .wakeup-logo span { color: white; }
  .wakeup-sub {
    font-size: 0.58rem; letter-spacing: 3px;
    color: var(--text-dim); margin-bottom: 40px;
    font-family: 'Share Tech Mono', monospace;
  }
  .wakeup-bars { display: flex; gap: 5px; margin-bottom: 36px; }
  .wakeup-bar {
    width: 3px; height: 32px; background: var(--border);
    animation: barPulse 1.2s ease-in-out infinite;
  }
  .wakeup-bar:nth-child(1){animation-delay:0s}
  .wakeup-bar:nth-child(2){animation-delay:0.1s}
  .wakeup-bar:nth-child(3){animation-delay:0.2s}
  .wakeup-bar:nth-child(4){animation-delay:0.3s}
  .wakeup-bar:nth-child(5){animation-delay:0.4s}
  .wakeup-bar:nth-child(6){animation-delay:0.5s}
  .wakeup-bar:nth-child(7){animation-delay:0.6s}
  .wakeup-bar:nth-child(8){animation-delay:0.7s}
  @keyframes barPulse {
    0%,100% { background:var(--border); transform:scaleY(1); }
    50%      { background:var(--accent); transform:scaleY(1.8); }
  }
  .wakeup-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem; color: var(--accent);
    letter-spacing: 2px; text-align: center;
    min-height: 20px; margin-bottom: 12px;
  }
  .wakeup-log {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem; color: var(--text-dim);
    letter-spacing: 1px; width: 100%; max-width: 340px;
    min-height: 80px; border: 1px solid var(--border);
    padding: 12px; background: var(--bg2); line-height: 2;
  }
  .wakeup-log .log-line { display: block; animation: wFadeIn 0.3s ease; }
  .wakeup-log .log-ok   { color: var(--accent); }
  .wakeup-log .log-wait { color: var(--accent2); }
  .wakeup-log .log-warn { color: #ffaa00; }
  @keyframes wFadeIn {
    from { opacity:0; transform:translateX(-6px); }
    to   { opacity:1; transform:none; }
  }
  .wakeup-timer {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem; color: #1a3a3a; letter-spacing: 2px; margin-top: 16px;
  }
</style>
</head>
<body>

<div class="scanner"></div>

<div class="container">

  <div class="logo">
    <div class="logo-text"><span class="g">GENESIS</span><span class="v">VAULT</span></div>
    <p>// Secure Access Terminal</p>
  </div>

  <div class="card">
    <h2>Authentication</h2>
    <p class="sub">$ vault --authenticate</p>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Login</div>
      <div class="tab" onclick="switchTab('register')">Register</div>
    </div>

    <div id="msg-box" class="msg-box"></div>

    <!-- ── LOGIN ── -->
    <div id="panel-login" class="form-panel active">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="hunter@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
          <button class="toggle-pw" onclick="togglePw('login-password',this)">SHOW</button>
        </div>
      </div>
      <button class="btn" id="login-btn" onclick="handleLogin()">[ ACCESS VAULT ]</button>
      <div class="forgot-link" style="margin-top:14px;">
        <a href="reset.html">// Forgot password?</a>
      </div>
    </div>

    <!-- ── REGISTER ── -->
    <div id="panel-register" class="form-panel">

      <!-- VC starter info -->
      <div class="starter-info">
        <div class="starter-box">
          <span class="starter-val">50</span>
          <span class="starter-label">VC ON SIGNUP</span>
        </div>
        <div class="starter-box">
          <span class="starter-val">+25</span>
          <span class="starter-label">VC WITH REFERRAL</span>
        </div>
        <div class="starter-box">
          <span class="starter-val">+25</span>
          <span class="starter-label">VC TO REFERRER</span>
        </div>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="your_handle" autocomplete="username" maxlength="24">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="hunter@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="reg-password" placeholder="min 8 characters"
            autocomplete="new-password" oninput="checkStrength(this.value)">
          <button class="toggle-pw" onclick="togglePw('reg-password',this)">SHOW</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="form-group">
        <label>Referral Code <span class="optional">(optional — earn bonus VC)</span></label>
        <div class="referral-wrap">
          <input type="text" id="reg-referral" placeholder="XXXXXXXX"
            oninput="onReferralInput(this)" maxlength="8" autocomplete="off">
          <span class="referral-badge" id="referral-badge">✓ VALID</span>
        </div>
        <div class="vc-hint" id="vc-hint">// +25 VC bonus will be applied on signup</div>
      </div>
      <button class="btn" id="reg-btn" onclick="handleRegister()">[ JOIN THE VAULT ]</button>
    </div>

  </div>

  <div class="back-link">
    <a href="index.html">← Return to base</a>
  </div>
</div>

<!-- WAKE-UP OVERLAY -->
<div id="wakeup-overlay">
  <div class="wakeup-logo">GENESIS<span>VAULT</span></div>
  <div class="wakeup-sub">// CONNECTING TO SECURE NODE</div>
  <div class="wakeup-bars">
    <div class="wakeup-bar"></div><div class="wakeup-bar"></div>
    <div class="wakeup-bar"></div><div class="wakeup-bar"></div>
    <div class="wakeup-bar"></div><div class="wakeup-bar"></div>
    <div class="wakeup-bar"></div><div class="wakeup-bar"></div>
  </div>
  <div class="wakeup-status" id="wakeup-status">Initializing...</div>
  <div class="wakeup-log" id="wakeup-log"></div>
  <div class="wakeup-timer" id="wakeup-timer"></div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ── SUPABASE INIT ──────────────────────────────────────────────────────
const SUPABASE_URL = 'https://pesrhpgixkronvzeouek.supabase.co';
const SUPABASE_KEY = 'sb_publishable_LPyioDvbIyZ3oy1PhccOMg_EcwWJjnr';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const VC_SIGNUP_BONUS    = 50;
const VC_REFERRAL_BONUS  = 25; // new user gets this
const VC_REFERRER_BONUS  = 25; // person whose code was used

// ── REDIRECT IF ALREADY LOGGED IN ────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.replace('dashboard.html');
})();

// ── TAB SWITCHING ─────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['login','register','forgot'][i] === tab);
  });
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  clearMsg();
}

// ── MESSAGES ──────────────────────────────────────────────────────────
function showMsg(text, type = 'error') {
  const el = document.getElementById('msg-box');
  el.className = `msg-box ${type}`;
  el.textContent = (type === 'error' ? '// ERROR: ' : '// ') + text;
  el.style.display = 'block';
}
function clearMsg() {
  const el = document.getElementById('msg-box');
  el.style.display = 'none';
  el.textContent = '';
}

// ── PASSWORD TOGGLE ───────────────────────────────────────────────────
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  const show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  btn.textContent = show ? 'HIDE' : 'SHOW';
  btn.style.color = show ? 'var(--accent)' : 'var(--text-dim)';
}

// ── PASSWORD STRENGTH ─────────────────────────────────────────────────
function checkStrength(val) {
  const fill  = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  let s = 0;
  if (val.length >= 8)  s++;
  if (val.length >= 12) s++;
  if (/[A-Z]/.test(val)) s++;
  if (/[0-9]/.test(val)) s++;
  if (/[^A-Za-z0-9]/.test(val)) s++;
  const levels = [
    { pct:'0%',   color:'transparent', text:'' },
    { pct:'25%',  color:'#ff003c',     text:'// WEAK' },
    { pct:'50%',  color:'#ff9500',     text:'// FAIR' },
    { pct:'75%',  color:'#00a8ff',     text:'// GOOD' },
    { pct:'100%', color:'#00f5c4',     text:'// STRONG' },
    { pct:'100%', color:'#00f5c4',     text:'// STRONG' },
  ];
  const lvl = levels[s] || levels[0];
  fill.style.width      = lvl.pct;
  fill.style.background = lvl.color;
  label.textContent     = lvl.text;
  label.style.color     = lvl.color;
}

// ── REFERRAL INPUT (async DB validation with debounce) ────────────────
let refTimeout = null;
let referralValid = false;

async function onReferralInput(inp) {
  inp.value = inp.value.toUpperCase();
  const code  = inp.value.trim();
  const badge = document.getElementById('referral-badge');
  const hint  = document.getElementById('vc-hint');

  clearTimeout(refTimeout);
  referralValid = false;

  if (code.length < 6) {
    badge.style.display = 'none';
    hint.style.display  = 'none';
    return;
  }

  badge.textContent    = '// CHECKING...';
  badge.style.color    = 'var(--accent2)';
  badge.style.display  = 'block';
  hint.style.display   = 'none';

  refTimeout = setTimeout(async () => {
    const { data } = await sb.from('users').select('id').eq('referral_code', code).maybeSingle();
    if (data) {
      referralValid        = true;
      badge.textContent    = '✓ VALID';
      badge.style.color    = 'var(--accent)';
      badge.style.display  = 'block';
      hint.style.display   = 'block';
    } else {
      referralValid        = false;
      badge.textContent    = '✗ INVALID';
      badge.style.color    = 'var(--accent3)';
      badge.style.display  = 'block';
      hint.style.display   = 'none';
    }
  }, 500);
}

// ── WAKE-UP OVERLAY ───────────────────────────────────────────────────
let wakeTimerInterval = null;
const WAKE_MESSAGES = [
  'Connecting to vault node...',
  'Initializing secure tunnel...',
  'Syncing authentication layer...',
  'Verifying node integrity...',
  'Establishing session...',
  'Almost ready...',
];

function showWakeup() {
  document.getElementById('wakeup-overlay').classList.add('active');
  const start = Date.now();
  wakeTimerInterval = setInterval(() => {
    const s = Math.floor((Date.now() - start) / 1000);
    document.getElementById('wakeup-timer').textContent = `ELAPSED: ${s}s`;
  }, 1000);
}
function hideWakeup() {
  document.getElementById('wakeup-overlay').classList.remove('active');
  clearInterval(wakeTimerInterval);
}
function setWakeStatus(msg) {
  document.getElementById('wakeup-status').textContent = msg;
}
function addLog(msg, type = 'log-wait') {
  const log = document.getElementById('wakeup-log');
  const line = document.createElement('span');
  line.className = `log-line ${type}`;
  line.textContent = `> ${msg}`;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
  const lines = log.querySelectorAll('.log-line');
  if (lines.length > 5) lines[0].remove();
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── LOGIN ─────────────────────────────────────────────────────────────
async function handleLogin() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn      = document.getElementById('login-btn');

  if (!email || !password) return showMsg('All fields required.');

  btn.disabled = true;
  btn.textContent = '[ AUTHENTICATING... ]';
  clearMsg();
  showWakeup();

  let msgIdx = 0;
  const wakeInterval = setInterval(() => {
    if (msgIdx < WAKE_MESSAGES.length) {
      setWakeStatus(WAKE_MESSAGES[msgIdx]);
      addLog(WAKE_MESSAGES[msgIdx], 'log-wait');
      msgIdx++;
    }
  }, 800);

  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    clearInterval(wakeInterval);

    if (error) {
      hideWakeup();
      const msg = error.message.includes('Invalid') ? 'Invalid email or password.' : error.message;
      showMsg(msg);
      btn.disabled = false;
      btn.textContent = '[ ACCESS VAULT ]';
      return;
    }

    addLog('Authentication successful!', 'log-ok');
    setWakeStatus('Access granted. Redirecting...');
    await sleep(800);
    hideWakeup();
    showMsg('Access granted. Welcome back.', 'success');
    setTimeout(() => window.location.replace('dashboard.html'), 800);

  } catch(e) {
    clearInterval(wakeInterval);
    hideWakeup();
    showMsg('Connection failed. Please try again.');
    btn.disabled = false;
    btn.textContent = '[ ACCESS VAULT ]';
  }
}

// ── REGISTER ──────────────────────────────────────────────────────────
async function handleRegister() {
  const username      = document.getElementById('reg-username').value.trim();
  const email         = document.getElementById('reg-email').value.trim();
  const password      = document.getElementById('reg-password').value;
  const referral_code = document.getElementById('reg-referral').value.trim().toUpperCase();
  const btn           = document.getElementById('reg-btn');

  if (!username || !email || !password) return showMsg('All fields required.');
  if (username.length < 3) return showMsg('Username must be at least 3 characters.');
  if (password.length < 8) return showMsg('Password must be at least 8 characters.');

  // Block if a referral code was typed but didn't pass DB validation yet
  const refInput = document.getElementById('reg-referral').value.trim().toUpperCase();
  if (refInput.length >= 6 && !referralValid) {
    const badge = document.getElementById('referral-badge');
    if (badge.textContent === '// CHECKING...') return showMsg('Please wait — validating referral code.');
    return showMsg('Referral code is invalid. Clear it or use a valid code.');
  }

  btn.disabled = true;
  btn.textContent = '[ PROCESSING... ]';
  clearMsg();
  showWakeup();

  let msgIdx = 0;
  const wakeInterval = setInterval(() => {
    if (msgIdx < WAKE_MESSAGES.length) {
      setWakeStatus(WAKE_MESSAGES[msgIdx]);
      addLog(WAKE_MESSAGES[msgIdx], 'log-wait');
      msgIdx++;
    }
  }, 700);

  try {
    // ── 1. Check username is unique ──
    const { data: existing } = await sb
      .from('users')
      .select('id')
      .eq('username', username)
      .maybeSingle();

    if (existing) {
      clearInterval(wakeInterval); hideWakeup();
      showMsg('Username already taken. Choose another.');
      btn.disabled = false; btn.textContent = '[ JOIN THE VAULT ]';
      return;
    }

    // ── 2. Validate referral code if provided ──
    let referrerId = null;
    if (referral_code) {
      const { data: referrer } = await sb
        .from('users')
        .select('id')
        .eq('referral_code', referral_code)
        .maybeSingle();

      if (referrer) {
        referrerId = referrer.id;
        addLog('Referral code validated!', 'log-ok');
      } else {
        addLog('Referral code not found — skipping bonus.', 'log-warn');
      }
    }

    // ── 3. Sign up with Supabase Auth ──
    const { data: authData, error: authError } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: { username } // stored in auth.users raw_user_meta_data
      }
    });

    if (authError) {
      clearInterval(wakeInterval); hideWakeup();
      showMsg(authError.message);
      btn.disabled = false; btn.textContent = '[ JOIN THE VAULT ]';
      return;
    }

    const userId = authData.user.id;

    // ── 4. Generate unique referral code for this new user ──
    const newReferralCode = generateCode(username);

    // ── 5. Calculate starting VC ──
    const startVC = VC_SIGNUP_BONUS + (referrerId ? VC_REFERRAL_BONUS : 0);

    // ── 6. Insert into users table ──
    const { error: insertError } = await sb.from('users').insert({
      id:            userId,
      username:      username,
      email:         email,
      credits:       startVC,
      referral_code: newReferralCode,
      referred_by:   referrerId,
      tier:          'Ghost',
      created_at:    new Date().toISOString(),
    });

    if (insertError) {
      clearInterval(wakeInterval); hideWakeup();
      // Handle unique username race condition
      if (insertError.code === '23505' || insertError.message.includes('unique')) {
        showMsg('Username already taken. Please choose another.');
      } else {
        showMsg('Account setup failed. Please try again.');
      }
      // Clean up the auth user we just created since profile insert failed
      await sb.auth.signOut();
      btn.disabled = false; btn.textContent = '[ JOIN THE VAULT ]';
      return;
    }

    // ── 7. Log signup VC transaction ──
    await sb.from('credit_transactions').insert({
      user_id:     userId,
      amount:      VC_SIGNUP_BONUS,
      type:        'signup_bonus',
      description: 'Welcome bonus',
      created_at:  new Date().toISOString(),
    });

    // ── 8. If referral valid — log bonus for new user + reward referrer ──
    if (referrerId) {
      await sb.from('credit_transactions').insert([
        {
          user_id:     userId,
          amount:      VC_REFERRAL_BONUS,
          type:        'referral_bonus',
          description: `Referral bonus — used code ${referral_code}`,
          created_at:  new Date().toISOString(),
        },
        {
          user_id:     referrerId,
          amount:      VC_REFERRER_BONUS,
          type:        'referral_reward',
          description: `Referred ${username}`,
          created_at:  new Date().toISOString(),
        }
      ]);

      // Add VC to referrer
      const { data: referrerUser } = await sb
        .from('users')
        .select('credits')
        .eq('id', referrerId)
        .single();

      if (referrerUser) {
        await sb.from('users')
          .update({ credits: referrerUser.credits + VC_REFERRER_BONUS })
          .eq('id', referrerId);
      }
    }

    clearInterval(wakeInterval);
    addLog('Account created!', 'log-ok');

    // ── Handle email confirmation requirement ──
    if (!authData.user.confirmed_at && !authData.user.email_confirmed_at) {
      setWakeStatus('Almost there! Check your inbox to confirm.');
      await sleep(1200);
      hideWakeup();
      showMsg('Account created! Please check your email to confirm before logging in.', 'info');
      btn.disabled = false;
      btn.textContent = '[ JOIN THE VAULT ]';
      return;
    }

    setWakeStatus(`+${startVC} VC credited. Welcome to the Vault.`);
    await sleep(1200);
    hideWakeup();
    showMsg(`Account created! ${startVC} VC credited. Welcome to Genesis Vault.`, 'success');
    setTimeout(() => window.location.replace('dashboard.html'), 1500);

  } catch(e) {
    clearInterval(wakeInterval); hideWakeup();
    showMsg('Something went wrong. Please try again.');
    btn.disabled = false; btn.textContent = '[ JOIN THE VAULT ]';
  }
}


// ── GENERATE REFERRAL CODE ────────────────────────────────────────────
function generateCode(username) {
  const base = username.replace(/[^a-z0-9]/gi, '').toUpperCase().slice(0, 4);
  const rand = Math.random().toString(36).substring(2, 6).toUpperCase();
  return (base + rand).slice(0, 8).padEnd(8, '0');
}

// ── ENTER KEY SUPPORT ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.form-panel.active');
  if (!active) return;
  if (active.id === 'panel-login')    handleLogin();
  if (active.id === 'panel-register') handleRegister();
});
</script>
