<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VAULT ADMIN // AI CONTROL</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #000;
  --bg2: #050d0a;
  --bg3: #0a1a12;
  --teal: #00f5c4;
  --teal-dim: #00a884;
  --teal-dark: #002a1e;
  --red: #ff3366;
  --green: #00ff88;
  --warn: #ffaa00;
  --text: #b8e8d8;
  --dim: #3a6a58;
  --border: #0d3a2a;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; }
body { display:flex; flex-direction:column; position:fixed; inset:0; overflow:hidden; }

/* SCANLINES */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,245,196,0.012) 2px,rgba(0,245,196,0.012) 4px);
}

/* ── AUTH SCREEN ── */
#auth-screen {
  position:fixed; inset:0; background:var(--bg); z-index:100;
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px;
}
.auth-logo { font-size:11px; letter-spacing:4px; color:var(--teal); margin-bottom:4px; }
.auth-sub { font-size:9px; color:var(--dim); letter-spacing:2px; margin-bottom:32px; }
.auth-box { width:100%; max-width:320px; }
.auth-label { font-size:9px; color:var(--dim); letter-spacing:2px; margin-bottom:6px; display:block; }
.auth-input {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  color:var(--teal); font-family:'JetBrains Mono',monospace; font-size:13px;
  padding:12px 14px; outline:none; margin-bottom:12px;
  -webkit-appearance:none;
}
.auth-input:focus { border-color:var(--teal-dim); }
.auth-btn {
  width:100%; background:var(--teal-dark); border:1px solid var(--teal-dim);
  color:var(--teal); font-family:'JetBrains Mono',monospace; font-size:11px;
  letter-spacing:2px; padding:13px; cursor:pointer; transition:background .15s;
}
.auth-btn:active { background:var(--teal); color:#000; }
.auth-err { font-size:10px; color:var(--red); margin-top:8px; text-align:center; min-height:16px; }
.auth-loading { font-size:10px; color:var(--dim); margin-top:8px; text-align:center; }

/* ── TOPBAR ── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px; border-bottom:1px solid var(--border);
  background:rgba(0,10,6,0.98); flex-shrink:0;
}
.topbar-logo { font-size:10px; letter-spacing:2px; color:var(--teal); }
.topbar-logo span { color:var(--text); }
.topbar-right { display:flex; align-items:center; gap:10px; }
.admin-badge { border:1px solid var(--teal-dim); padding:2px 7px; font-size:8px; letter-spacing:2px; color:var(--teal); }
.logout-btn { font-size:8px; color:var(--red); letter-spacing:1px; cursor:pointer; padding:3px 6px; border:1px solid #330011; }

/* ── TABS ── */
.tabs {
  display:flex; border-bottom:1px solid var(--border);
  background:#030d08; flex-shrink:0;
}
.tab {
  flex:1; padding:10px 4px; font-size:9px; letter-spacing:1px; text-align:center;
  color:var(--dim); cursor:pointer; border-bottom:2px solid transparent;
  transition:all .15s;
}
.tab.active { color:var(--teal); border-bottom-color:var(--teal); }

/* ── CONTENT ── */
#content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px; }

/* ── SECTION ── */
.section { display:none; }
.section.active { display:block; }
.section-title { font-size:9px; letter-spacing:3px; color:var(--teal-dim); margin-bottom:12px; }

/* ── ENGINE CARDS ── */
.engine-card {
  background:var(--bg3); border:1px solid var(--border);
  padding:12px 14px; margin-bottom:8px;
  display:flex; align-items:center; justify-content:space-between;
}
.engine-info { flex:1; }
.engine-name { font-size:12px; font-weight:700; color:var(--text); letter-spacing:1px; }
.engine-model { font-size:9px; color:var(--dim); margin-top:2px; }
.engine-key { font-size:8px; margin-top:3px; }
.engine-key.ok { color:var(--green); }
.engine-key.miss { color:var(--red); }
.toggle-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; margin-left:12px; }
.toggle {
  position:relative; width:44px; height:24px; cursor:pointer;
}
.toggle input { display:none; }
.toggle-track {
  position:absolute; inset:0; background:#1a2e24; border:1px solid var(--border);
  transition:background .2s;
}
.toggle input:checked ~ .toggle-track { background:var(--teal-dark); border-color:var(--teal-dim); }
.toggle-thumb {
  position:absolute; top:3px; left:3px; width:16px; height:16px;
  background:var(--dim); transition:all .2s;
}
.toggle input:checked ~ .toggle-thumb { left:23px; background:var(--teal); }
.toggle-label { font-size:8px; color:var(--dim); letter-spacing:1px; }
.toggle input:checked ~ .toggle-label { color:var(--teal); }

/* ── MODE SELECTOR ── */
.mode-bar {
  background:var(--bg3); border:1px solid var(--border); padding:12px 14px; margin-bottom:14px;
}
.mode-bar-title { font-size:9px; color:var(--dim); letter-spacing:2px; margin-bottom:8px; }
.mode-btns { display:flex; gap:8px; }
.mode-btn {
  flex:1; padding:8px; font-size:9px; letter-spacing:1px; text-align:center;
  border:1px solid var(--border); background:var(--bg); color:var(--dim); cursor:pointer;
  transition:all .15s;
}
.mode-btn.active { background:var(--teal-dark); border-color:var(--teal-dim); color:var(--teal); }

/* ── STATS ── */
.stat-card {
  background:var(--bg3); border:1px solid var(--border);
  padding:12px 14px; margin-bottom:8px;
}
.stat-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.stat-username { font-size:12px; color:var(--teal); font-weight:600; }
.stat-tokens { font-size:11px; color:var(--warn); }
.stat-row { display:flex; justify-content:space-between; font-size:9px; color:var(--dim); margin-top:3px; }
.stat-providers { font-size:9px; color:var(--text); margin-top:6px; }
.provider-tag {
  display:inline-block; border:1px solid var(--border); padding:1px 5px;
  font-size:8px; color:var(--teal-dim); margin:2px 2px 0 0;
}

/* ── LOGS ── */
.log-entry {
  background:var(--bg3); border:1px solid var(--border);
  padding:10px 12px; margin-bottom:6px;
}
.log-meta { display:flex; justify-content:space-between; font-size:8px; color:var(--dim); margin-bottom:5px; }
.log-user { color:var(--teal-dim); }
.log-provider { color:var(--warn); }
.log-query { font-size:10px; color:var(--text); margin-bottom:4px; word-break:break-word; }
.log-response { font-size:9px; color:var(--dim); word-break:break-word; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.log-tokens { font-size:8px; color:var(--green); margin-top:4px; }

/* ── REFRESH BTN ── */
.refresh-btn {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  color:var(--teal-dim); font-family:'JetBrains Mono',monospace;
  font-size:9px; letter-spacing:2px; padding:10px; cursor:pointer; margin-bottom:14px;
}
.refresh-btn:active { background:var(--teal-dark); color:var(--teal); }

/* ── LOADING ── */
.loading { text-align:center; color:var(--dim); font-size:10px; padding:20px; }
.empty { text-align:center; color:var(--dim); font-size:10px; padding:30px; }

/* ── STATUS BAR ── */
.statusbar {
  display:flex; justify-content:space-between; padding:4px 12px;
  background:#000; font-size:8px; color:var(--dim); letter-spacing:1px; flex-shrink:0;
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">GENESIS VAULT</div>
  <div class="auth-sub">// ADMIN AI CONTROL //</div>
  <div class="auth-box">
    <label class="auth-label">ADMIN TOKEN</label>
    <input type="password" class="auth-input" id="token-input" placeholder="paste your admin token..." autocomplete="off">
    <button class="auth-btn" id="auth-btn">AUTHENTICATE</button>
    <div class="auth-err" id="auth-err"></div>
  </div>
</div>

<!-- MAIN UI -->
<div id="main-ui" style="display:none;flex-direction:column;height:100%;">

  <div class="topbar">
    <div class="topbar-logo">VAULT <span>//</span> AI ADMIN</div>
    <div class="topbar-right">
      <span class="admin-badge" id="admin-name">ADMIN</span>
      <span class="logout-btn" id="logout-btn">LOGOUT</span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="engines">ENGINES</div>
    <div class="tab" data-tab="users">USERS</div>
    <div class="tab" data-tab="logs">LOGS</div>
  </div>

  <div id="content">

    <!-- ENGINES TAB -->
    <div class="section active" id="tab-engines">
      <div class="mode-bar">
        <div class="mode-bar-title">ENGINE MODE</div>
        <div class="mode-btns">
          <div class="mode-btn active" id="mode-auto" onclick="setMode('auto')">AUTO FAILOVER</div>
          <div class="mode-btn" id="mode-manual" onclick="setMode('manual')">MANUAL SELECT</div>
        </div>
      </div>
      <div class="section-title">AI PROVIDERS</div>
      <div id="engines-list"><div class="loading">LOADING PROVIDERS...</div></div>
    </div>

    <!-- USERS TAB -->
    <div class="section" id="tab-users">
      <div class="section-title">PER-USER TOKEN USAGE</div>
      <button class="refresh-btn" onclick="loadUsers()">↻ REFRESH</button>
      <div id="users-list"><div class="loading">LOADING STATS...</div></div>
    </div>

    <!-- LOGS TAB -->
    <div class="section" id="tab-logs">
      <div class="section-title">RECENT AI CONVERSATIONS</div>
      <button class="refresh-btn" onclick="loadLogs()">↻ REFRESH</button>
      <div id="logs-list"><div class="loading">LOADING LOGS...</div></div>
    </div>

  </div>

  <div class="statusbar">
    <span id="status-left">VAULT AI ADMIN</span>
    <span id="clock"></span>
    <span id="status-right">SECURE</span>
  </div>

</div>

<script>
const AI_URL = 'https://genesis-ai-backend.onrender.com';
let adminToken = '';
let currentMode = 'auto';

// ── CLOCK ──
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB');
}, 1000);

// ── AUTH ──
document.getElementById('auth-btn').addEventListener('click', authenticate);
document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') authenticate();
});

async function authenticate() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) return showErr('TOKEN REQUIRED');
  document.getElementById('auth-btn').textContent = 'VERIFYING...';
  document.getElementById('auth-err').textContent = '';

  try {
    const res = await fetch(`${AI_URL}/admin/ai-status`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.status === 401) {
      showErr('INVALID TOKEN. ACCESS DENIED.');
      document.getElementById('auth-btn').textContent = 'AUTHENTICATE';
      return;
    }
    const data = await res.json();
    if (data.providers) {
      adminToken = token;
      sessionStorage.setItem('admin_token', token);
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('main-ui').style.display = 'flex';
      renderEngines(data.providers);
      loadUsers();
    } else {
      showErr('UNEXPECTED RESPONSE.');
      document.getElementById('auth-btn').textContent = 'AUTHENTICATE';
    }
  } catch(e) {
    showErr('CONNECTION FAILED. CHECK BACKEND.');
    document.getElementById('auth-btn').textContent = 'AUTHENTICATE';
  }
}

function showErr(msg) {
  document.getElementById('auth-err').textContent = msg;
}

// Auto-restore session
window.addEventListener('load', () => {
  const saved = sessionStorage.getItem('admin_token');
  if (saved) {
    document.getElementById('token-input').value = saved;
    authenticate();
  }
});

// Logout
document.getElementById('logout-btn').addEventListener('click', () => {
  sessionStorage.removeItem('admin_token');
  adminToken = '';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('main-ui').style.display = 'none';
  document.getElementById('token-input').value = '';
  document.getElementById('auth-btn').textContent = 'AUTHENTICATE';
});

// ── TABS ──
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'users') loadUsers();
    if (tab.dataset.tab === 'logs') loadLogs();
  });
});

// ── ENGINE MODE ──
function setMode(mode) {
  currentMode = mode;
  document.getElementById('mode-auto').classList.toggle('active', mode === 'auto');
  document.getElementById('mode-manual').classList.toggle('active', mode === 'manual');
  document.getElementById('status-left').textContent = `MODE: ${mode.toUpperCase()}`;
}

// ── RENDER ENGINES ──
function renderEngines(providers) {
  const list = document.getElementById('engines-list');
  list.innerHTML = '';
  providers.forEach(p => {
    const card = document.createElement('div');
    card.className = 'engine-card';
    card.innerHTML = `
      <div class="engine-info">
        <div class="engine-name">${p.name}</div>
        <div class="engine-model">${p.model}</div>
        <div class="engine-key ${p.hasKey ? 'ok' : 'miss'}">${p.hasKey ? '✓ KEY SET' : '✗ NO KEY'}</div>
      </div>
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" ${p.active ? 'checked' : ''} onchange="toggleEngine('${p.name}', this.checked)">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
        <span class="toggle-label">${p.active ? 'ON' : 'OFF'}</span>
      </div>
    `;
    list.appendChild(card);
  });
}

async function toggleEngine(name, active) {
  try {
    const res = await fetch(`${AI_URL}/admin/ai-toggle`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${adminToken}`
      },
      body: JSON.stringify({ name, active })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('status-right').textContent = `${name}: ${active ? 'ON' : 'OFF'}`;
      // Update label
      document.querySelectorAll('.engine-card').forEach(card => {
        if (card.querySelector('.engine-name').textContent === name) {
          card.querySelector('.toggle-label').textContent = active ? 'ON' : 'OFF';
        }
      });
    }
  } catch(e) {
    alert('Failed to toggle: ' + e.message);
  }
}

// ── USERS ──
async function loadUsers() {
  const list = document.getElementById('users-list');
  list.innerHTML = '<div class="loading">LOADING...</div>';
  try {
    const res = await fetch(`${AI_URL}/admin/user-stats`, {
      headers: { 'Authorization': `Bearer ${adminToken}` }
    });
    const data = await res.json();
    if (!data.users || data.users.length === 0) {
      list.innerHTML = '<div class="empty">NO USER DATA YET</div>';
      return;
    }
    list.innerHTML = '';
    data.users.forEach(u => {
      const providerTags = Object.entries(u.providers)
        .map(([p, c]) => `<span class="provider-tag">${p}: ${c}</span>`).join('');
      const lastActive = u.last_active ? new Date(u.last_active).toLocaleDateString() : 'N/A';
      const card = document.createElement('div');
      card.className = 'stat-card';
      card.innerHTML = `
        <div class="stat-card-header">
          <span class="stat-username">${u.username}</span>
          <span class="stat-tokens">${u.total_tokens.toLocaleString()} tokens</span>
        </div>
        <div class="stat-row">
          <span>Queries: ${u.total_queries}</span>
          <span>Last: ${lastActive}</span>
        </div>
        <div class="stat-providers">${providerTags}</div>
      `;
      list.appendChild(card);
    });
  } catch(e) {
    list.innerHTML = `<div class="empty">ERROR: ${e.message}</div>`;
  }
}

// ── LOGS ──
async function loadLogs() {
  const list = document.getElementById('logs-list');
  list.innerHTML = '<div class="loading">LOADING...</div>';
  try {
    const res = await fetch(`${AI_URL}/admin/recent-logs`, {
      headers: { 'Authorization': `Bearer ${adminToken}` }
    });
    const data = await res.json();
    if (!data.logs || data.logs.length === 0) {
      list.innerHTML = '<div class="empty">NO LOGS YET</div>';
      return;
    }
    list.innerHTML = '';
    data.logs.forEach(log => {
      const time = log.created_at ? new Date(log.created_at).toLocaleString() : '';
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `
        <div class="log-meta">
          <span class="log-user">${log.username || 'anon'}</span>
          <span class="log-provider">${log.provider || 'unknown'}</span>
          <span>${time}</span>
        </div>
        <div class="log-query">&gt; ${log.user_query || ''}</div>
        <div class="log-response">${log.ai_response || ''}</div>
        <div class="log-tokens">~${log.tokens_used || 0} tokens</div>
      `;
      list.appendChild(entry);
    });
  } catch(e) {
    list.innerHTML = `<div class="empty">ERROR: ${e.message}</div>`;
  }
}
</script>
</body>
</html>
