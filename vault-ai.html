
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GENESIS VAULT AI // TERMINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --bg2: #050a05;
      --green: #00ff88;
      --green-dim: #00aa55;
      --green-dark: #003322;
      --cyan: #00ffff;
      --red: #ff3333;
      --yellow: #ffcc00;
      --gray: #333333;
      --text: #ccffdd;
      --border: #00ff8844;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'JetBrains Mono', 'Share Tech Mono', monospace;
      display: flex;
      flex-direction: column;
      position: fixed;
      inset: 0;
      width: 100%;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,20,10,0.95);
      flex-shrink: 0;
    }

    .topbar-left { display: flex; align-items: center; gap: 8px; }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--green);
    }

    .logo span { color: var(--cyan); }
    .separator { color: var(--gray); font-size: 10px; }
    .system-label { font-size: 9px; color: var(--green-dim); letter-spacing: 1px; }

    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .rank-badge {
      border: 1px solid var(--green-dim);
      padding: 2px 6px;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--green);
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--green); }
      50% { opacity: 0.3; }
    }

    .terminal
