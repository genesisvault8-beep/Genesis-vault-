<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GENESIS VAULT AI // TERMINAL</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000;
      --bg2: #050a05;
      --green: #00ff88;
      --green-dim: #00aa55;
      --green-dark: #003322;
      --cyan: #00ffff;
      --red: #ff3333;
      --text: #ccffdd;
      --border: #00ff8844;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { height: 100%; }
    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      flex-direction: column;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.012) 2px, rgba(0,255,136,0.012) 4px);
      pointer-events: none;
      z-index: 100;
    }
    /* TOP BAR */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,15,8,0.97);
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 7px; }
    .logo { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--green); }
    .logo span { color: var(--cyan); }
    .sep { color: #333; font-size: 10px; }
    .sys-label { font-size: 9px; color: var(--green-dim); letter-spacing: 1px; }
    .topbar-right { display: flex; align-items: center; gap: 7px; }
    .rank-badge { border: 1px solid var(--green-dim); padding: 2px 6px; font-size: 8px; letter-spacing: 2px; color: var(--green); }
    .dot-live { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 4px var(--green)} 50%{opacity:.3} }
    /* TITLE BAR */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: #080808;
      border-bottom: 1px solid #111;
      flex-shrink: 0;
    }
    .tdot { width: 8px; height: 8px; border-radius: 50%; }
    .tdot.r { background: #ff5f56; }
    .tdot.y { background: #ffbd2e; }
    .tdot.g { background: #27c93f; }
    .ttitle { font-size: 9px; color: #444; letter-spacing: 2px; margin-left: 4px; }
    /* OUTPUT */
    #output {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.65;
      background: var(--bg2);
      min-height: 0;
      overscroll-behavior: contain;
    }
    #output::-webkit-scrollbar { width: 2px; }
    #output::-webkit-scrollbar-thumb { background: var(--green-dark); }
    .line { margin-bottom: 1px; word-break: break-word; white-space: pre-wrap; }
    .sys { color: var(--cyan); }
    .logc { color: var(--green-dim); }
    .user { color: var(--text); }
    .ai { color: var(--green); }
    .err { color: var(--red); }
    .div { color: #1a3322; margin: 4px 0; }
    .typing::after { content:'█'; animation: blink .7s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    /* INPUT AREA */
    .input-area {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      border-top: 1px solid var(--border);
      background: rgba(0,8,4,0.98);
      gap: 6px;
      flex-shrink: 0;
    }
    .input-prefix {
      color: var(--green);
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
      user-select: none;
    }
    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      caret-color: var(--green);
      min-width: 0;
      -webkit-appearance: none;
    }
    #userInput::placeholder { color: #1a3322; font-size: 11px; }
    #sendBtn {
      background: var(--green-dark);
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 5px 10px;
      cursor: pointer;
      flex-shrink: 0;
      min-height: 30px;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    #sendBtn:active { background: var(--green); color: #000; }
    #sendBtn:disabled { opacity: 0.3; }
    /* STATUS BAR */
    .statusbar {
      display: flex;
      justify-content: space-between;
      padding: 3px 10px;
      background: #000;
      font-size: 8px;
      color: #1a3322;
      letter-spacing: 1px;
      flex-shrink: 0;
    }
    @media (max-width: 360px) {
      .sys-label, .statusbar .mid { display: none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">GENESIS<span>VAULT</span></div>
    <div class="sep">//</div>
    <div class="sys-label">AI TERMINAL v1.0</div>
  </div>
  <div class="topbar-right">
    <span class="rank-badge">GHOST</span>
    <span class="dot-live"></span>
  </div>
</div>

<div class="titlebar">
  <div class="tdot r"></div>
  <div class="tdot y"></div>
  <div class="tdot g"></div>
  <div class="ttitle">VAULT-AI // SECURE CHANNEL</div>
</div>

<div id="output"></div>

<div class="input-area">
  <span class="input-prefix">GHOST:~$</span>
  <input type="text" id="userInput" placeholder="enter query..." autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off">
  <button id="sendBtn">SEND</button>
</div>

<div class="statusbar">
  <span>GENESIS VAULT AI</span>
  <span class="mid" id="clock"></span>
  <span>SESSION: ACTIVE</span>
</div>

<script>
const BACKEND_URL = 'https://genesis-vault-backend.onrender.com';
const USER_RANK = 'Ghost';
let busy = false;
let history = [];
let histIdx = -1;

const out = document.getElementById('output');
const inp = document.getElementById('userInput');
const btn = document.getElementById('sendBtn');

setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB');
}, 1000);

function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function print(text, cls = 'logc') {
  const d = document.createElement('div');
  d.className = 'line ' + cls;
  d.textContent = text;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
  return d;
}

function printHTML(html, cls = 'logc') {
  const d = document.createElement('div');
  d.className = 'line ' + cls;
  d.innerHTML = html;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
  return d;
}

function divider() { print('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'div'); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function typewrite(el, text, speed = 8) {
  return new Promise(resolve => {
    el.classList.add('typing');
    let i = 0;
    const pre = el.innerHTML;
    function tick() {
      if (i < text.length) {
        el.innerHTML = pre + esc(text.slice(0, ++i));
        out.scrollTop = out.scrollHeight;
        setTimeout(tick, speed);
      } else {
        el.classList.remove('typing');
        resolve();
      }
    }
    tick();
  });
}

async function boot() {
  await sleep(150);
  print('GENESIS VAULT AI // INFINITY ENGINE', 'sys');
  divider();
  print('[SYS]: INITIALIZING VAULT RECOVERY...', 'sys');
  await sleep(400);

  try {
    const res = await fetch(`${BACKEND_URL}/api/session`);
    const data = await res.json();
    if (data.status === 'success') {
      document.querySelector('.rank-badge').textContent = data.rank.toUpperCase();
      if (data.history && data.history.length > 0) {
        print(`[SYS]: RECOVERING ${data.history.length} PREVIOUS LOGS...`, 'sys');
        await sleep(300);
        data.history.forEach(log => {
          printHTML(`<span style="color:var(--green);opacity:.7">GHOST:~$</span> ${esc(log.user_query)}`, 'user');
          printHTML(`<span style="color:var(--green);opacity:.7">[VAULT-AI]:</span> ${esc(log.ai_response ? log.ai_response.slice(0,120)+'...' : '')}`, 'ai');
        });
      }
      print(`[SYS]: SESSION RESTORED. RANK: ${data.rank.toUpperCase()}. LOGS: ${data.total_logs}`, 'sys');
    }
  } catch(e) {
    print('[SYS]: FRESH SESSION INITIALIZED.', 'sys');
  }

  await sleep(300);
  print('[SYS]: ALL SYSTEMS NOMINAL. VAULT ONLINE.', 'sys');
  divider();
  print('[LOG]: Type "help" for commands.', 'logc');
  divider();
} 

function local(cmd) {
  const c = cmd.toLowerCase().trim();
  if (c === 'help') {
    divider();
    print('[CMD]: AVAILABLE COMMANDS', 'sys');
    print('  help         → this menu', 'logc');
    print('  clear        → clear screen', 'logc');
    print('  rank         → rank info', 'logc');
    print('  status       → system status', 'logc');
    print('  methodology  → bug bounty steps', 'logc');
    print('  [anything]   → ask Genesis Vault AI', 'logc');
    divider();
    return true;
  }
  if (c === 'clear') { out.innerHTML = ''; print('[SYS]: CLEARED.', 'sys'); return true; }
  if (c === 'rank') {
    print('[SYS]: CURRENT RANK → GHOST', 'sys');
    print('[LOG]: Ghost→Scout→Hunter→Predator→Phantom→Architect→Guardian', 'logc');
    return true;
  }
  if (c === 'status') {
    print('[SYS]: BACKEND    → ONLINE (Render/Flask)', 'sys');
    print('[SYS]: DATABASE   → ONLINE (Supabase)', 'sys');
    print('[SYS]: AI ENGINE  → ONLINE (Groq/Llama)', 'sys');
    return true;
  }
  if (c === 'methodology') {
    divider();
    print('[SYS]: BUG BOUNTY METHODOLOGY', 'sys');
    print('  01 → robots.txt & sitemap.xml recon', 'logc');
    print('  02 → Observatory security scan', 'logc');
    print('  03 → Subdomain enumeration (subfinder)', 'logc');
    print('  04 → Clickjacking / iframe PoC test', 'logc');
    print('  05 → Full PoC build', 'logc');
    print('  06 → Report with proof & screenshots', 'logc');
    divider();
    return true;
  }
  return false;
}

async function send(msg) {
  if (busy || !msg.trim()) return;
  busy = true;
  btn.disabled = true;
  inp.blur();

  printHTML(`<span style="color:var(--green);opacity:.7">GHOST:~$</span> ${esc(msg)}`, 'user');

  if (local(msg)) {
    busy = false;
    btn.disabled = false;
    return;
  }
if (msg.toLowerCase().startsWith('scan ')) {
    const target = msg.slice(5).trim();
    const analyzing = print(`[LOG]: INITIATING RECON ON ${target.toUpperCase()}...`, 'logc');
    try {
      const res = await fetch(`${BACKEND_URL}/api/recon`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target: target })
      });
      const data = await res.json();
      analyzing.remove();
      if (data.response) {
        const el = document.createElement('div');
        el.className = 'line ai';
        el.innerHTML = `<span style="color:var(--green);opacity:.7">[RECON]:</span> `;
        out.appendChild(el);
        await typewrite(el, data.response, 6);
      }
    } catch(e) {
      analyzing.remove();
      print('[ERR]: RECON FAILED.', 'err');
    }
    busy = false;
    btn.disabled = false;
    return;
  }
  
  await sleep(80);
  const analyzing = print('[LOG]: ANALYZING... ROUTING TO INFINITY ENGINE...', 'logc');

  try {
    const res = await fetch(`${BACKEND_URL}/api/vault-ai`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, rank: USER_RANK })
    });
    const data = await res.json();
    analyzing.remove();

    if (data.response) {
      const el = document.createElement('div');
      el.className = 'line ai';
      el.innerHTML = `<span style="color:var(--green);opacity:.7">[VAULT-AI]:</span> `;
      out.appendChild(el);
      out.scrollTop = out.scrollHeight;
      await typewrite(el, data.response, 7);
    } else {
      print('[ERR]: UNEXPECTED RESPONSE.', 'err');
    }
  } catch(e) {
    analyzing.remove();
    print('[ERR]: FAILED TO REACH VAULT BACKEND. CHECK CONNECTION.', 'err');
  }

  busy = false;
  btn.disabled = false;
}

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !busy) {
    const v = inp.value.trim();
    if (v) { history.unshift(v); histIdx = -1; inp.value = ''; send(v); }
  }
  if (e.key === 'ArrowUp' && histIdx < history.length - 1) inp.value = history[++histIdx];
  if (e.key === 'ArrowDown') { histIdx > 0 ? inp.value = history[--histIdx] : (histIdx = -1, inp.value = ''); }
});

btn.addEventListener('click', () => {
  const v = inp.value.trim();
  if (v && !busy) { history.unshift(v); histIdx = -1; inp.value = ''; send(v); }
});

boot();
</script>
</body>
</html>
